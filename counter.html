<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Happy Birthday Scarlet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,900;1,600&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Berkshire+Swash&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
<style>
  :root{
    --cream-base:#FDFBF7;
    --cream-deep:#F5EFEB;
    --taupe:#E8DDD2;
    --pink-soft:#FFD1DC;
    --pink-deep:#F4A7B9;
    --pink-neon:#FF8FB0;
    --brown-primary:#362214;
    --brown-muted:#9C7B67;
    --metal-1:#F3ECE4;
    --metal-2:#DACDBF;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100vh;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--cream-base) 0%, var(--cream-deep) 55%, var(--taupe) 100%);
    font-family:'DM Sans', sans-serif;
    color:var(--brown-primary);
    overflow-x:hidden;
    position:relative;
  }

  .font-display{ font-family:'Playfair Display', serif; }

  .glow-blob{
    position:fixed;
    border-radius:50%;
    filter:blur(80px);
    opacity:.55;
    pointer-events:none;
    z-index:0;
    animation:drift 18s ease-in-out infinite alternate;
  }
  .glow-blob.a{ width:420px;height:420px; background:var(--pink-soft); top:-120px; left:-100px; }
  .glow-blob.b{ width:380px;height:380px; background:var(--pink-deep); bottom:-140px; right:-100px; animation-delay:3s; }
  .glow-blob.c{ width:260px;height:260px; background:var(--taupe); top:40%; left:60%; animation-delay:6s; }
  @keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(30px,-20px) scale(1.08); }
  }

  canvas{ position:fixed; top:0; left:0; pointer-events:none; }
  #confetti-canvas{ z-index:50; }
  #balloon-canvas{ z-index:40; }

  #banner-wrap{
    position:fixed;
    top:0; left:0; right:0;
    z-index:60;
    height:76px;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(253,251,247,.92), rgba(253,251,247,.55));
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(54,34,20,.08);
    display:flex;
    align-items:center;
    opacity:0;
    transform:translateY(-100%);
    transition:opacity .6s ease, transform .6s ease;
  }
  #banner-wrap.show{ opacity:1; transform:translateY(0); }
  #banner-wrap::after{
    content:'';
    position:absolute;
    top:0; left:-40%;
    width:30%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.65), transparent);
    animation:shimmerSweep 3.4s ease-in-out infinite;
    pointer-events:none;
    mix-blend-mode:overlay;
  }
  @keyframes shimmerSweep{
    0%{ left:-40%; }
    60%, 100%{ left:120%; }
  }
  .banner-track{
    display:flex;
    white-space:nowrap;
    animation:scrollBanner 14s linear infinite;
    will-change:transform;
  }
  .banner-item{
    display:inline-flex;
    font-family:'Berkshire Swash', cursive;
    font-weight:400;
    font-size:clamp(26px, 4.6vw, 42px);
    padding:0 2.2rem;
    letter-spacing:.015em;
  }
  .banner-letter{
    display:inline-block;
    background:linear-gradient(180deg, var(--pink-neon), var(--pink-deep));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:letterWave 1.7s ease-in-out infinite, letterGlow 2.1s ease-in-out infinite;
  }
  @keyframes letterWave{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-5px) rotate(-1.5deg); }
  }
  @keyframes letterGlow{
    0%,100%{ filter:drop-shadow(0 0 6px rgba(255,143,176,.4)); }
    50%{ filter:drop-shadow(0 0 18px rgba(255,143,176,.95)); }
  }
  @keyframes scrollBanner{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }

  .stage{
    position:relative;
    z-index:10;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:96px 20px 60px;
    text-align:center;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--brown-muted);
    margin-bottom:14px;
  }

  .hero-title{
    font-size:clamp(34px, 6vw, 64px);
    font-weight:700;
    line-height:1.05;
    margin-bottom:10px;
    color:var(--brown-primary);
  }
  .hero-title em{
    font-style:italic;
    color:var(--pink-neon);
    text-shadow:0 0 24px rgba(255,143,176,.4);
  }

  .hero-sub{
    color:var(--brown-muted);
    font-size:15px;
    margin-bottom:42px;
    max-width:440px;
  }

  .timer-card{
    display:flex;
    gap:10px;
    padding:22px 26px;
    border-radius:28px;
    background:linear-gradient(155deg, var(--metal-1), var(--metal-2));
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 -1px 0 rgba(54,34,20,.08) inset,
      0 18px 40px -16px rgba(54,34,20,.25);
    border:1px solid rgba(54,34,20,.06);
  }
  .timer-unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:64px;
    padding:14px 8px;
    border-radius:18px;
    background:linear-gradient(180deg, var(--cream-base), var(--cream-deep));
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 6px 16px -8px rgba(54,34,20,.3);
    transition:box-shadow .25s ease, transform .25s ease;
  }
  .timer-unit:hover{
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 0 0 2px var(--pink-neon), 0 0 24px rgba(255,143,176,.55);
    transform:translateY(-2px);
  }
  .timer-num{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(28px, 5vw, 40px);
    color:var(--brown-primary);
    line-height:1;
    position:relative;
    height:1.1em;
    overflow:hidden;
    width:1.5em;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .timer-num .digit{
    transition:transform 1.4s cubic-bezier(.2,.8,.2,1), opacity 1.4s ease;
  }
  .timer-num .digit.flip-out{
    transform:translateY(-100%);
    opacity:0;
    position:absolute;
  }
  .timer-num .digit.flip-in{
    animation:digitIn 1.4s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes digitIn{
    from{ transform:translateY(100%); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .timer-label{
    font-size:10px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--brown-muted);
    margin-top:6px;
  }
  .timer-sep{
    align-self:center;
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:24px;
    color:var(--brown-muted);
    opacity:.6;
  }

  #celebration{
    position:relative;
    z-index:30;
    opacity:0;
    transform:translateY(24px);
    pointer-events:none;
    transition:opacity .9s ease, transform .9s ease;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  #celebration.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  #hero-intro.hide{
    opacity:0;
    transform:translateY(-16px) scale(.98);
    transition:opacity 15s ease, transform 15s ease;
    pointer-events:none;
    transition-delay:0s;
  }
  #hero-intro.hide.collapsed{
    height:0;
    overflow:hidden;
  }

  .cake-wrap{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    width:100%;
    margin-top:32px;
  }

  .candle-note{
    position:absolute;
    top:8px;
    left:-54px;
    font-size:14px;
    font-weight:700;
    color:var(--brown-primary);
    white-space:nowrap;
    padding:7px 14px;
    border-radius:14px;
    background:linear-gradient(155deg, var(--pink-soft), var(--metal-1));
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 8px 18px -10px rgba(54,34,20,.4);
    border:1px solid rgba(244,167,185,.45);
    animation:noteBounce 1.7s ease-in-out infinite;
    transition:opacity .4s ease, transform .4s ease;
    z-index:5;
  }
  .candle-note::after{
    content:'';
    position:absolute;
    top:50%;
    right:-6px;
    transform:translateY(-50%);
    border-width:6px 0 6px 7px;
    border-style:solid;
    border-color:transparent transparent transparent var(--metal-1);
  }
  @keyframes noteBounce{
    0%,100%{ transform:translateX(0); }
    50%{ transform:translateX(-4px); }
  }
  .candle-note.hide{
    opacity:0;
    transform:translateX(-8px) scale(.92);
    animation:none;
    pointer-events:none;
  }

  .flame{
    position:absolute;
    left:50%;
    bottom:100%;
    transform:translateX(-50%);
    width:14px;
    height:24px;
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    background:radial-gradient(circle at 50% 70%, #fff6cf 0%, #ffd36b 35%, #ff8f4d 65%, transparent 75%);
    opacity:0;
    pointer-events:none;
    transform-origin:bottom center;
    filter:drop-shadow(0 0 10px rgba(255,170,80,.8));
  }
  .flame.lit{
    opacity:1;
    animation:flicker 1.1s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{ transform:translateX(-50%) scale(1) rotate(-2deg); }
    25%{ transform:translateX(-50%) scale(1.05,.95) rotate(2deg); }
    50%{ transform:translateX(-50%) scale(.95,1.05) rotate(-1deg); }
    75%{ transform:translateX(-50%) scale(1.02,.98) rotate(3deg); }
  }
  .wick-glow{
    position:absolute;
    left:50%;
    bottom:100%;
    transform:translateX(-50%);
    width:46px;
    height:46px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,180,90,.55), transparent 70%);
    opacity:0;
    transition:opacity .4s ease;
    pointer-events:none;
  }
  .wick-glow.lit{ opacity:1; }

  .candle{
    position:relative;
    cursor:pointer;
  }
  .candle:active{ transform:scale(.96); }

  .smoke{
    position:absolute;
    left:50%;
    bottom:100%;
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(140,130,120,.5);
    pointer-events:none;
    animation:smokeUp 1.6s ease-out forwards;
  }
  @keyframes smokeUp{
    0%{ transform:translate(-50%,0) scale(1); opacity:.6; }
    100%{ transform:translate(calc(-50% + var(--dx,10px)), -60px) scale(3); opacity:0; }
  }

  .age-wrap{
    position:relative;
    display:inline-block;
    margin-bottom:22px;
    transform:translateY(-14px);
  }
  .age-glow{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(56px, 11vw, 104px);
    color:var(--pink-neon);
    line-height:1;
    display:inline-block;
    text-shadow:
      0 0 18px rgba(255,143,176,.55),
      0 0 46px rgba(255,143,176,.35);
    animation:agePulse 2.4s ease-in-out infinite, ageJiggle 3.4s ease-in-out infinite;
    transform-origin:center bottom;
  }
  @keyframes agePulse{
    0%,100%{ text-shadow:0 0 18px rgba(255,143,176,.55), 0 0 46px rgba(255,143,176,.35); }
    50%{ text-shadow:0 0 30px rgba(255,143,176,.85), 0 0 70px rgba(255,143,176,.55); }
  }
  @keyframes ageJiggle{
    0%,100%{ transform:rotate(-2deg) scale(1); }
    20%{ transform:rotate(2deg) scale(1.03); }
    45%{ transform:rotate(-1.5deg) scale(.98); }
    70%{ transform:rotate(2.5deg) scale(1.02); }
  }
  .sparkle{
    position:absolute;
    width:9px;
    height:9px;
    border-radius:50%;
    background:radial-gradient(circle, #FFFFFF 0%, var(--pink-neon) 55%, transparent 75%);
    opacity:0;
    pointer-events:none;
    animation:sparkleTwinkle 2.6s ease-in-out infinite;
  }
  @keyframes sparkleTwinkle{
    0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
    50%{ opacity:1; transform:scale(1.1) rotate(180deg); }
  }

  .continue-btn{
    margin-top:72px;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    width:66px;
    height:66px;
    border-radius:50%;
    position:relative;
    background:linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
    box-shadow:
      0 1px 0 rgba(255,255,255,.5) inset,
      0 14px 28px -10px rgba(244,167,185,.7);
    text-decoration:none;
    cursor:pointer;
    border:none;
    animation:arrowFloat 2.4s ease-in-out infinite;
    transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
  }
  .continue-btn::before{
    content:'';
    position:absolute;
    inset:-8px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
    opacity:.4;
    filter:blur(12px);
    z-index:-1;
    animation:arrowGlowPulse 2.4s ease-in-out infinite;
  }
  .continue-btn svg{
    width:26px;
    height:26px;
    color:var(--cream-base);
    transition:transform .25s ease;
  }
  .continue-btn:hover{
    transform:translateY(-5px) scale(1.08) rotate(-4deg);
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 20px 40px -10px rgba(255,143,176,.85);
    filter:brightness(1.05);
  }
  .continue-btn:hover svg{ transform:translateX(4px) rotate(8deg); }
  .continue-btn:active{ transform:translateY(-2px) scale(.95); }
  @keyframes arrowFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-7px); }
  }
  @keyframes arrowGlowPulse{
    0%,100%{ opacity:.3; transform:scale(1); }
    50%{ opacity:.6; transform:scale(1.18); }
  }

  @media (max-width: 520px){
    .candle-note{ left:0; right:0; margin:0 auto; width:fit-content; top:-46px; }
    .candle-note::after{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .glow-blob, .banner-track, .banner-letter, #banner-wrap::after,
    .flame.lit, .age-glow, .sparkle, .candle-note, .continue-btn, .continue-btn::before{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="glow-blob a"></div>
  <div class="glow-blob b"></div>
  <div class="glow-blob c"></div>

  <canvas id="confetti-canvas"></canvas>
  <canvas id="balloon-canvas"></canvas>

  <div id="banner-wrap">
    <div class="banner-track" id="banner-track"></div>
  </div>

  <main class="stage">

    <div id="hero-intro">
      <div class="eyebrow">A little something is coming</div>
      <h1 class="hero-title">Counting the moments<br/>for <em>Scarlet</em></h1>
      <p class="hero-sub">The candles are almost ready &mdash; here's exactly how long it's been since the wait began.</p>

      <div class="timer-card" id="timer-card">
        <div class="timer-unit"><div class="timer-num" data-unit="days"><span class="digit">0</span></div><div class="timer-label">Days</div></div>
        <div class="timer-sep">:</div>
        <div class="timer-unit"><div class="timer-num" data-unit="hours"><span class="digit">0</span></div><div class="timer-label">Hours</div></div>
        <div class="timer-sep">:</div>
        <div class="timer-unit"><div class="timer-num" data-unit="minutes"><span class="digit">0</span></div><div class="timer-label">Min</div></div>
        <div class="timer-sep">:</div>
        <div class="timer-unit"><div class="timer-num" data-unit="seconds"><span class="digit">0</span></div><div class="timer-label">Sec</div></div>
      </div>
    </div>

    <div id="celebration" class="cake-layer">

      <div class="age-wrap">
        <span class="sparkle" style="top:-6px; left:-14px; animation-delay:.1s;"></span>
        <span class="sparkle" style="top:10%; right:-18px; animation-delay:.7s;"></span>
        <span class="sparkle" style="bottom:6%; left:-20px; animation-delay:1.3s;"></span>
        <span class="sparkle" style="bottom:-8px; right:-10px; animation-delay:1.9s;"></span>
        <span class="sparkle" style="top:40%; left:48%; animation-delay:.4s;"></span>
        <div class="age-glow">22</div>
      </div>

      <div class="cake-wrap">
        <div style="position:relative;">
          <div class="candle-note" id="candle-note">Click</div>

          <svg id="cake-svg" width="220" height="190" viewBox="0 0 220 190" style="overflow:visible;">
            <defs>
              <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#F3ECE4"/>
                <stop offset="100%" stop-color="#DACDBF"/>
              </linearGradient>
              <linearGradient id="tierTop" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#FFE3EA"/>
                <stop offset="100%" stop-color="#F4A7B9"/>
              </linearGradient>
              <linearGradient id="tierMid" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#FFD1DC"/>
                <stop offset="100%" stop-color="#F08CA3"/>
              </linearGradient>
              <linearGradient id="tierBase" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#F5EFEB"/>
                <stop offset="100%" stop-color="#E8DDD2"/>
              </linearGradient>
            </defs>

            <ellipse cx="110" cy="178" rx="92" ry="10" fill="url(#plate)"/>

            <rect x="30" y="128" width="160" height="44" rx="10" fill="url(#tierBase)"/>
            <ellipse cx="110" cy="128" rx="80" ry="10" fill="#FBF6F1"/>
            <path d="M30 128 q80 18 160 0" fill="none" stroke="#DACDBF" stroke-width="2" opacity=".6"/>

            <rect x="52" y="90" width="116" height="42" rx="9" fill="url(#tierMid)"/>
            <ellipse cx="110" cy="90" rx="58" ry="9" fill="#FFE0E8"/>
            <path d="M52 108 q58 14 116 0" fill="none" stroke="#F4A7B9" stroke-width="2" opacity=".5"/>

            <rect x="74" y="58" width="72" height="36" rx="8" fill="url(#tierTop)"/>
            <ellipse cx="110" cy="58" rx="36" ry="7" fill="#FFEFF2"/>

            <circle cx="68" cy="132" r="4" fill="#FFD1DC"/>
            <circle cx="150" cy="135" r="3.5" fill="#FFD1DC"/>
            <circle cx="92" cy="96" r="3" fill="#FFEFF2"/>
            <circle cx="138" cy="98" r="3" fill="#FFEFF2"/>

            <g class="candle" id="candle" data-lit="false">
              <rect x="104" y="36" width="12" height="24" rx="3" fill="#FFFDF9" stroke="#E8DDD2"/>
              <rect x="104" y="36" width="12" height="6" rx="3" fill="#F4A7B9"/>
              <line x1="110" y1="36" x2="110" y2="30" stroke="#9C7B67" stroke-width="1.6"/>
            </g>
          </svg>

          <div class="wick-glow" id="wick-glow"></div>
          <div class="flame" id="flame"></div>
        </div>
      </div>

      <a href="garden.html" class="continue-btn" aria-label="Continue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
        </svg>
      </a>
    </div>

  </main>

<script>
(function(){
  "use strict";

  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var confettiCanvas = document.getElementById('confetti-canvas');
  var cctx = confettiCanvas.getContext('2d');
  var balloonCanvas = document.getElementById('balloon-canvas');
  var bctx = balloonCanvas.getContext('2d');

  function resizeCanvases(){
    [confettiCanvas, balloonCanvas].forEach(function(c){
      c.width = window.innerWidth;
      c.height = window.innerHeight;
    });
  }
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  var confettiColors = ['#FFD1DC','#F4A7B9','#FF8FB0','#E8DDD2','#9C7B67','#FDFBF7'];
  var confettiParticles = [];

  function makeConfetti(x, y, count){
    for(var i=0;i<count;i++){
      var angle = Math.random() * Math.PI * 2;
      var speed = 4 + Math.random() * 8;
      confettiParticles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 4,
        size: 5 + Math.random() * 6,
        color: confettiColors[Math.floor(Math.random()*confettiColors.length)],
        rot: Math.random() * Math.PI,
        vr: (Math.random()-0.5) * 0.3,
        life: 0,
        maxLife: 140 + Math.random()*60,
        shape: Math.random() > 0.5 ? 'rect' : 'circle'
      });
    }
  }

  function burstConfetti(big){
    var w = confettiCanvas.width, h = confettiCanvas.height;
    makeConfetti(w/2, h/2, big ? 160 : 60);
    makeConfetti(0, h*0.2, big ? 50 : 25);
    makeConfetti(w, h*0.2, big ? 50 : 25);
    makeConfetti(0, h, big ? 35 : 18);
    makeConfetti(w, h, big ? 35 : 18);
  }

  function stepConfetti(){
    cctx.clearRect(0,0,confettiCanvas.width, confettiCanvas.height);
    var gravity = 0.18, drag = 0.992;
    confettiParticles = confettiParticles.filter(function(p){
      p.vx *= drag;
      p.vy = p.vy * drag + gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.life++;

      var alpha = 1 - Math.max(0, (p.life - p.maxLife*0.7) / (p.maxLife*0.3));
      if(p.life > p.maxLife || p.y > confettiCanvas.height + 40) return false;

      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.globalAlpha = Math.max(0, alpha);
      cctx.fillStyle = p.color;
      if(p.shape === 'rect'){
        cctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.65);
      } else {
        cctx.beginPath();
        cctx.arc(0,0,p.size/2,0,Math.PI*2);
        cctx.fill();
      }
      cctx.restore();
      return true;
    });
    requestAnimationFrame(stepConfetti);
  }
  stepConfetti();

  var balloonColors = ['#FFD1DC','#F4A7B9','#FF8FB0','#E8DDD2','#9C7B67'];
  var balloons = [];

  function spawnBalloon(delayY){
    var w = balloonCanvas.width, h = balloonCanvas.height;
    return {
      x: 40 + Math.random() * (w - 80),
      y: h + (delayY || 0) + Math.random()*200,
      size: 28 + Math.random()*22,
      color: balloonColors[Math.floor(Math.random()*balloonColors.length)],
      speed: 0.5 + Math.random()*1.1,
      wobble: Math.random()*Math.PI*2,
      wobbleSpeed: 0.01 + Math.random()*0.02,
      sway: 16 + Math.random()*22,
      rot: (Math.random()-0.5)*0.2
    };
  }

  function startBalloons(){
    balloons = [];
    var count = 10 + Math.floor(Math.random()*6);
    for(var i=0;i<count;i++){
      balloons.push(spawnBalloon(i*120));
    }
    stepBalloons();
  }

  function drawBalloon(b){
    var x = b.x + Math.sin(b.wobble) * b.sway;
    var topY = b.y;
    var fadeStart = balloonCanvas.height * 0.18;
    var alpha = b.y < fadeStart ? Math.max(0, b.y / fadeStart) : 1;

    bctx.save();
    bctx.globalAlpha = alpha;
    bctx.translate(x, topY);
    bctx.rotate(b.rot);

    bctx.strokeStyle = 'rgba(54,34,20,0.35)';
    bctx.lineWidth = 1.2;
    bctx.beginPath();
    bctx.moveTo(0, b.size*0.9);
    bctx.quadraticCurveTo(6, b.size*1.3, 0, b.size*1.8);
    bctx.stroke();

    var grad = bctx.createRadialGradient(-b.size*0.3, -b.size*0.3, b.size*0.1, 0, 0, b.size);
    grad.addColorStop(0, '#FFFFFF');
    grad.addColorStop(0.15, b.color);
    grad.addColorStop(1, b.color);
    bctx.fillStyle = grad;
    bctx.beginPath();
    bctx.ellipse(0, 0, b.size*0.78, b.size, 0, 0, Math.PI*2);
    bctx.fill();

    bctx.fillStyle = b.color;
    bctx.beginPath();
    bctx.moveTo(-5, b.size*0.92);
    bctx.lineTo(5, b.size*0.92);
    bctx.lineTo(0, b.size*1.05);
    bctx.closePath();
    bctx.fill();

    bctx.restore();
  }

  function stepBalloons(){
    bctx.clearRect(0,0,balloonCanvas.width, balloonCanvas.height);
    balloons.forEach(function(b){
      b.y -= b.speed;
      b.wobble += b.wobbleSpeed;
      if(b.y < -60){
        var fresh = spawnBalloon(0);
        fresh.y = balloonCanvas.height + 60;
        Object.assign(b, fresh);
      }
      drawBalloon(b);
    });
    requestAnimationFrame(stepBalloons);
  }

  var target = new Date("2024-06-15T00:00:00");
  var fired = false;

  function renderUnit(unitEl, value){
    var str = String(value);
    var prev = unitEl.querySelector('.digit');
    if(prev && prev.textContent === str) return;
    if(prev){
      prev.classList.add('flip-out');
      setTimeout(function(){ prev.remove(); }, 450);
    }
    var span = document.createElement('span');
    span.className = 'digit flip-in';
    span.textContent = str;
    unitEl.appendChild(span);
  }

  function tick(){
    var now = new Date();
    var diff = target - now;

    var days, hours, minutes, seconds;
    if(diff <= 0){
      days = hours = minutes = seconds = 0;
    } else {
      days = Math.floor(diff / 86400000);
      hours = Math.floor((diff % 86400000) / 3600000);
      minutes = Math.floor((diff % 3600000) / 60000);
      seconds = Math.floor((diff % 60000) / 1000);
    }

    document.querySelectorAll('.timer-num').forEach(function(el){
      var unit = el.getAttribute('data-unit');
      var val = unit === 'days' ? days : unit === 'hours' ? hours : unit === 'minutes' ? minutes : seconds;
      renderUnit(el, val);
    });

    if(diff <= 0 && !fired){
      fired = true;
      burstConfetti(true);
      setTimeout(revealCelebration, 650);
    }
  }
  tick();
  setInterval(tick, 1000);

  var heroIntro = document.getElementById('hero-intro');
  var celebration = document.getElementById('celebration');
  var bannerWrap = document.getElementById('banner-wrap');

  function revealCelebration(){
    heroIntro.classList.add('hide');
    celebration.classList.add('show');
    bannerWrap.classList.add('show');
    if(!reduceMotion) startBalloons();
    setTimeout(function(){ heroIntro.classList.add('collapsed'); }, 8000);
  }

  var bannerTrack = document.getElementById('banner-track');
  function buildBannerItem(text){
    var item = document.createElement('span');
    item.className = 'banner-item';
    text.split('').forEach(function(ch, idx){
      var s = document.createElement('span');
      s.className = 'banner-letter';
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      var delay = (idx * 0.045).toFixed(3) + 's';
      s.style.animationDelay = delay + ', ' + delay;
      item.appendChild(s);
    });
    return item;
  }
  for(var i=0;i<6;i++){
    bannerTrack.appendChild(buildBannerItem('Happy Birthday Scarlet'));
  }

  var candle = document.getElementById('candle');
  var flame = document.getElementById('flame');
  var wickGlow = document.getElementById('wick-glow');
  var candleNote = document.getElementById('candle-note');
  var cakeWrap = candle.closest('svg').parentElement;

  function spawnSmoke(){
    for(var i=0;i<6;i++){
      (function(i){
        setTimeout(function(){
          var s = document.createElement('div');
          s.className = 'smoke';
          s.style.setProperty('--dx', (Math.random()*30-15)+'px');
          s.style.left = (110 + (Math.random()*10-5)) + 'px';
          cakeWrap.style.position = 'relative';
          cakeWrap.appendChild(s);
          setTimeout(function(){ s.remove(); }, 1700);
        }, i*120);
      })(i);
    }
  }

  function toggleCandle(){
    var lit = candle.getAttribute('data-lit') === 'true';
    if(!lit){
      candle.setAttribute('data-lit','true');
      flame.classList.add('lit');
      wickGlow.classList.add('lit');
      if(candleNote) candleNote.classList.add('hide');
    } else {
      candle.setAttribute('data-lit','false');
      flame.classList.remove('lit');
      wickGlow.classList.remove('lit');
      spawnSmoke();
      if(candleNote) candleNote.classList.remove('hide');
    }
  }
  candle.addEventListener('click', toggleCandle);
  candle.addEventListener('touchend', function(e){ e.preventDefault(); toggleCandle(); }, {passive:false});

})();
</script>
</body>
</html>
