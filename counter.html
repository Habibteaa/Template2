<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Scarlet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,900;1,600&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Berkshire+Swash&display=swap" rel="stylesheet">
<style>
/* ─── Design tokens ─────────────────────────────────────────── */
:root{
  --cream-base:#FDFBF7;
  --cream-deep:#F5EFEB;
  --taupe:#E8DDD2;
  --pink-soft:#FFD1DC;
  --pink-deep:#F4A7B9;
  --pink-neon:#FF8FB0;
  --brown-primary:#362214;
  --brown-muted:#9C7B67;
  --metal-1:#F3ECE4;
  --metal-2:#DACDBF;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  width:100%;
  min-height:100vh;
  background: radial-gradient(120% 90% at 50% -10%,
    var(--cream-base) 0%, var(--cream-deep) 55%, var(--taupe) 100%);
  font-family:'DM Sans', sans-serif;
  color:var(--brown-primary);
  overflow-x:hidden;
}

/* ─── Background blobs ──────────────────────────────────────── */
.glow-blob{
  position:fixed; border-radius:50%;
  filter:blur(80px); opacity:.5;
  pointer-events:none; z-index:0;
  animation:drift 18s ease-in-out infinite alternate;
}
.glow-blob.a{ width:min(420px,80vw); height:min(420px,80vw); background:var(--pink-soft); top:-15%; left:-10%; }
.glow-blob.b{ width:min(380px,75vw); height:min(380px,75vw); background:var(--pink-deep); bottom:-15%; right:-10%; animation-delay:3s; }
.glow-blob.c{ width:min(260px,55vw); height:min(260px,55vw); background:var(--taupe); top:40%; left:60%; animation-delay:6s; }
@keyframes drift{
  0%  { transform:translate(0,0) scale(1); }
  100%{ transform:translate(30px,-20px) scale(1.08); }
}

/* ─── Canvas ────────────────────────────────────────────────── */
canvas{ position:fixed; top:0; left:0; pointer-events:none; }
#confetti-canvas{ z-index:50; }
#balloon-canvas { z-index:40; }

/* ─── Scrolling banner ──────────────────────────────────────── */
#banner-wrap{
  position:fixed; top:0; left:0; right:0; z-index:60;
  height:clamp(52px, 8vw, 76px);
  overflow:hidden;
  background:linear-gradient(180deg,rgba(253,251,247,.92),rgba(253,251,247,.55));
  backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(54,34,20,.08);
  display:flex; align-items:center;
  opacity:0; transform:translateY(-100%);
  transition:opacity .6s ease, transform .6s ease;
}
#banner-wrap.show{ opacity:1; transform:translateY(0); }
#banner-wrap::after{
  content:''; position:absolute; top:0; left:-40%;
  width:30%; height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.65),transparent);
  animation:shimmerSweep 3.4s ease-in-out infinite;
  pointer-events:none; mix-blend-mode:overlay;
}
@keyframes shimmerSweep{ 0%{left:-40%} 60%,100%{left:120%} }

.banner-track{
  display:flex; white-space:nowrap;
  animation:scrollBanner 14s linear infinite;
  will-change:transform;
}
.banner-item{
  display:inline-flex;
  font-family:'Berkshire Swash', cursive;
  font-size:clamp(18px, 4vw, 42px);
  padding:0 clamp(1rem, 3vw, 2.2rem);
  letter-spacing:.015em;
}
.banner-letter{
  display:inline-block;
  background:linear-gradient(180deg,var(--pink-neon),var(--pink-deep));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:letterWave 1.7s ease-in-out infinite, letterGlow 2.1s ease-in-out infinite;
}
@keyframes letterWave{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  50%     { transform:translateY(-4px) rotate(-1.5deg); }
}
@keyframes letterGlow{
  0%,100%{ filter:drop-shadow(0 0 6px rgba(255,143,176,.4)); }
  50%     { filter:drop-shadow(0 0 18px rgba(255,143,176,.95)); }
}
@keyframes scrollBanner{
  from{ transform:translateX(0); }
  to  { transform:translateX(-50%); }
}

/* ─── Stage ─────────────────────────────────────────────────── */
.stage{
  position:relative; z-index:10;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: clamp(80px,12vh,110px) clamp(16px,5vw,40px) clamp(40px,6vh,80px);
  text-align:center;
}

/* ─── Hero intro ────────────────────────────────────────────── */
#hero-intro{
  display:flex; flex-direction:column; align-items:center;
  width:100%; max-width: clamp(320px, 90vw, 900px);
  transition:opacity 1.2s ease, transform 1.2s ease;
}
#hero-intro.hide{
  opacity:0; transform:translateY(-16px) scale(.98);
  pointer-events:none;
}
#hero-intro.collapsed{ display:none; }

.eyebrow{
  font-size: clamp(11px, 2vw, 17px);
  letter-spacing:.28em; text-transform:uppercase;
  color:var(--brown-primary); font-weight:700;
  margin-bottom: clamp(10px, 2vh, 18px);
}

.hero-title{
  font-family:'Playfair Display', serif;
  font-size: clamp(28px, 5.5vw, 80px);
  font-weight:700; line-height:1.08;
  margin-bottom: clamp(8px, 1.5vh, 18px);
  color:var(--brown-primary);
}
.hero-title em{
  font-style:italic; color:var(--pink-neon);
  text-shadow:0 0 24px rgba(255,143,176,.4);
}

/* ─── Timer card ────────────────────────────────────────────── */
.timer-card{
  display:inline-flex;
  gap: clamp(5px, 1.2vw, 18px);
  padding: clamp(14px, 2.5vw, 32px) clamp(16px, 3vw, 38px);
  border-radius: clamp(20px, 4vw, 36px);
  background:linear-gradient(155deg,var(--metal-1),var(--metal-2));
  box-shadow:
    0 1px 0 rgba(255,255,255,.6) inset,
    0 -1px 0 rgba(54,34,20,.08) inset,
    0 18px 40px -16px rgba(54,34,20,.25);
  border:1px solid rgba(54,34,20,.06);
}
.timer-unit{
  display:flex; flex-direction:column; align-items:center;
  min-width: clamp(54px, 12vw, 130px);
  padding: clamp(10px, 2vw, 22px) clamp(6px, 1.2vw, 16px);
  border-radius: clamp(14px, 3vw, 24px);
  background:linear-gradient(180deg,var(--cream-base),var(--cream-deep));
  box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 6px 16px -8px rgba(54,34,20,.3);
  transition:box-shadow .25s ease, transform .25s ease;
}
.timer-unit:hover{
  box-shadow:0 1px 0 rgba(255,255,255,.7) inset,
    0 0 0 2px var(--pink-neon), 0 0 24px rgba(255,143,176,.55);
  transform:translateY(-2px);
}
.timer-num{
  font-family:'Playfair Display', serif;
  font-weight:900;
  font-size: clamp(22px, 4.5vw, 64px);
  color:var(--brown-primary); line-height:1;
  position:relative; height:1.1em; overflow:hidden;
  width:1.6em;
  display:flex; align-items:center; justify-content:center;
}
.timer-num .digit{ transition:transform 1.4s cubic-bezier(.2,.8,.2,1), opacity 1.4s ease; }
.timer-num .digit.flip-out{ transform:translateY(-100%); opacity:0; position:absolute; }
.timer-num .digit.flip-in{ animation:digitIn 1.4s cubic-bezier(.2,.8,.2,1); }
@keyframes digitIn{
  from{ transform:translateY(100%); opacity:0; }
  to  { transform:translateY(0);    opacity:1; }
}
.timer-label{
  font-size: clamp(8px, 1.4vw, 13px);
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--brown-muted);
  margin-top: clamp(4px, 1vw, 10px);
}
.timer-sep{
  align-self:center;
  font-family:'Playfair Display', serif; font-weight:700;
  font-size: clamp(18px, 3.5vw, 36px);
  color:var(--brown-muted); opacity:.6;
}

/* ─── Celebration section ───────────────────────────────────── */
#celebration{
  position:relative; z-index:30;
  opacity:0; transform:translateY(24px);
  pointer-events:none;
  transition:opacity .9s ease, transform .9s ease;
  width:100%; max-width: clamp(320px, 90vw, 900px);
  display:none; flex-direction:column; align-items:center;
}
#celebration.show{
  display:flex; opacity:1; transform:translateY(0);
  pointer-events:auto;
}

/* ─── Age number ────────────────────────────────────────────── */
.age-wrap{
  position:relative; display:inline-block;
  margin-bottom: clamp(14px, 3vh, 28px);
}
.age-glow{
  font-family:'Playfair Display', serif; font-weight:900;
  font-size: clamp(56px, 14vw, 150px);
  color:var(--pink-neon); line-height:1;
  display:inline-block;
  text-shadow:0 0 18px rgba(255,143,176,.55), 0 0 46px rgba(255,143,176,.35);
  animation:agePulse 2.4s ease-in-out infinite, ageJiggle 3.4s ease-in-out infinite;
  transform-origin:center bottom;
}
@keyframes agePulse{
  0%,100%{ text-shadow:0 0 18px rgba(255,143,176,.55),0 0 46px rgba(255,143,176,.35); }
  50%     { text-shadow:0 0 30px rgba(255,143,176,.85),0 0 70px rgba(255,143,176,.55); }
}
@keyframes ageJiggle{
  0%,100%{ transform:rotate(-2deg) scale(1); }
  20%     { transform:rotate(2deg)  scale(1.03); }
  45%     { transform:rotate(-1.5deg) scale(.98); }
  70%     { transform:rotate(2.5deg)  scale(1.02); }
}
.sparkle{
  position:absolute; width:9px; height:9px; border-radius:50%;
  background:radial-gradient(circle,#FFF 0%,var(--pink-neon) 55%,transparent 75%);
  opacity:0; pointer-events:none;
  animation:sparkleTwinkle 2.6s ease-in-out infinite;
}
@keyframes sparkleTwinkle{
  0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
  50%    { opacity:1; transform:scale(1.1) rotate(180deg); }
}

/* ─── Cake ──────────────────────────────────────────────────── */
.cake-wrap{
  position:relative; display:flex;
  justify-content:center; align-items:flex-end;
  width:100%;
  margin-top: clamp(16px, 3vh, 36px);
}
/* The SVG scales via CSS — viewBox keeps proportions */
#cake-svg{
  width: clamp(170px, 45vw, 420px);
  height: auto;
  overflow:visible;
}

.candle-note{
  position:absolute;
  top: clamp(-44px,-8vw,8px);
  left: clamp(-10px,-5vw,-60px);
  font-size: clamp(12px, 2vw, 16px);
  font-weight:700; color:var(--brown-primary);
  white-space:nowrap;
  padding: clamp(6px,1vw,10px) clamp(10px,2vw,16px);
  border-radius:14px;
  background:linear-gradient(155deg,var(--pink-soft),var(--metal-1));
  box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 8px 18px -10px rgba(54,34,20,.4);
  border:1px solid rgba(244,167,185,.45);
  animation:noteBounce 1.7s ease-in-out infinite;
  transition:opacity .4s ease, transform .4s ease;
  z-index:5;
}
.candle-note::after{
  content:''; position:absolute; top:50%; right:-6px;
  transform:translateY(-50%);
  border-width:6px 0 6px 7px; border-style:solid;
  border-color:transparent transparent transparent var(--metal-1);
}
.candle-note.hide{ opacity:0; transform:translateX(-8px) scale(.92); animation:none; pointer-events:none; }
@keyframes noteBounce{
  0%,100%{ transform:translateX(0); }
  50%     { transform:translateX(-4px); }
}

/* ─── Flame & candle ────────────────────────────────────────── */
.flame{
  position:absolute; left:50%; bottom:100%;
  transform:translateX(-50%);
  width:14px; height:24px;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  background:radial-gradient(circle at 50% 70%,#fff6cf 0%,#ffd36b 35%,#ff8f4d 65%,transparent 75%);
  opacity:0; pointer-events:none; transform-origin:bottom center;
  filter:drop-shadow(0 0 10px rgba(255,170,80,.8));
}
.flame.lit{ opacity:1; animation:flicker 1.1s ease-in-out infinite; }
@keyframes flicker{
  0%,100%{ transform:translateX(-50%) scale(1) rotate(-2deg); }
  25%     { transform:translateX(-50%) scale(1.05,.95) rotate(2deg); }
  50%     { transform:translateX(-50%) scale(.95,1.05) rotate(-1deg); }
  75%     { transform:translateX(-50%) scale(1.02,.98) rotate(3deg); }
}
.wick-glow{
  position:absolute; left:50%; bottom:100%;
  transform:translateX(-50%);
  width:46px; height:46px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,180,90,.55),transparent 70%);
  opacity:0; transition:opacity .4s ease; pointer-events:none;
}
.wick-glow.lit{ opacity:1; }
.candle{ position:relative; cursor:pointer; }
.candle:active{ transform:scale(.96); }

.smoke{
  position:absolute; left:50%; bottom:100%;
  width:6px; height:6px; border-radius:50%;
  background:rgba(140,130,120,.5); pointer-events:none;
  animation:smokeUp 1.6s ease-out forwards;
}
@keyframes smokeUp{
  0%  { transform:translate(-50%,0) scale(1); opacity:.6; }
  100%{ transform:translate(calc(-50% + var(--dx,10px)),-60px) scale(3); opacity:0; }
}

/* ─── Continue button ───────────────────────────────────────── */
.continue-btn{
  margin-top: clamp(40px, 8vh, 80px);
  margin-bottom:18px;
  display:flex; align-items:center; justify-content:center;
  width: clamp(54px, 10vw, 80px);
  height: clamp(54px, 10vw, 80px);
  border-radius:50%;
  background:linear-gradient(135deg,var(--pink-neon),var(--pink-deep));
  box-shadow:0 1px 0 rgba(255,255,255,.5) inset,
    0 14px 28px -10px rgba(244,167,185,.7);
  text-decoration:none; cursor:pointer; border:none;
  animation:arrowFloat 2.4s ease-in-out infinite;
  transition:transform .25s, box-shadow .25s, filter .25s;
  position:relative;
}
.continue-btn::before{
  content:''; position:absolute; inset:-8px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--pink-neon),var(--pink-deep));
  opacity:.4; filter:blur(12px); z-index:-1;
  animation:arrowGlowPulse 2.4s ease-in-out infinite;
}
.continue-btn svg{
  width: clamp(20px, 4vw, 30px);
  height: clamp(20px, 4vw, 30px);
  color:var(--cream-base); transition:transform .25s;
}
.continue-btn:hover{
  transform:translateY(-5px) scale(1.08) rotate(-4deg);
  box-shadow:0 1px 0 rgba(255,255,255,.6) inset,
    0 20px 40px -10px rgba(255,143,176,.85);
  filter:brightness(1.05);
}
.continue-btn:hover svg{ transform:translateX(4px) rotate(8deg); }
.continue-btn:active{ transform:translateY(-2px) scale(.95); }
@keyframes arrowFloat{
  0%,100%{ transform:translateY(0); }
  50%     { transform:translateY(-7px); }
}
@keyframes arrowGlowPulse{
  0%,100%{ opacity:.3; transform:scale(1); }
  50%     { opacity:.6; transform:scale(1.18); }
}

/* ─── Small phones (≤360px) — prevent overflow ──────────────── */
@media (max-width:360px){
  .timer-card{ gap:4px; padding:10px 10px; }
  .timer-unit{ min-width:48px; padding:8px 4px; }
  .candle-note{ left:50%; transform:translateX(-50%); top:-46px; }
  .candle-note::after{ display:none; }
}

/* ─── Tablets / iPads (768px+) ──────────────────────────────── */
@media (min-width:768px){
  .candle-note{
    top:8px;
    left:-64px;
  }
  .candle-note::after{ display:block; }
}

/* ─── Reduced motion ────────────────────────────────────────── */
@media (prefers-reduced-motion:reduce){
  .glow-blob,.banner-track,.banner-letter,#banner-wrap::after,
  .flame.lit,.age-glow,.sparkle,.candle-note,.continue-btn,.continue-btn::before{
    animation:none !important;
  }
}
</style>
</head>
<body>

<div class="glow-blob a"></div>
<div class="glow-blob b"></div>
<div class="glow-blob c"></div>

<canvas id="confetti-canvas"></canvas>
<canvas id="balloon-canvas"></canvas>

<div id="banner-wrap">
  <div class="banner-track" id="banner-track"></div>
</div>

<main class="stage">

  <div id="hero-intro">
    <div class="eyebrow">A little something is coming</div>
    <h1 class="hero-title">Counting the moments<br/>for <em>Scarlet</em></h1>

    <div class="timer-card" id="timer-card">
      <div class="timer-unit"><div class="timer-num" data-unit="days"><span class="digit">0</span></div><div class="timer-label">Days</div></div>
      <div class="timer-sep">:</div>
      <div class="timer-unit"><div class="timer-num" data-unit="hours"><span class="digit">0</span></div><div class="timer-label">Hours</div></div>
      <div class="timer-sep">:</div>
      <div class="timer-unit"><div class="timer-num" data-unit="minutes"><span class="digit">0</span></div><div class="timer-label">Min</div></div>
      <div class="timer-sep">:</div>
      <div class="timer-unit"><div class="timer-num" data-unit="seconds"><span class="digit">0</span></div><div class="timer-label">Sec</div></div>
    </div>
  </div>

  <div id="celebration">

    <div class="age-wrap">
      <span class="sparkle" style="top:-6px;left:-14px;animation-delay:.1s"></span>
      <span class="sparkle" style="top:10%;right:-18px;animation-delay:.7s"></span>
      <span class="sparkle" style="bottom:6%;left:-20px;animation-delay:1.3s"></span>
      <span class="sparkle" style="bottom:-8px;right:-10px;animation-delay:1.9s"></span>
      <span class="sparkle" style="top:40%;left:48%;animation-delay:.4s"></span>
      <div class="age-glow">22</div>
    </div>

    <div class="cake-wrap">
      <div style="position:relative;">
        <div class="candle-note" id="candle-note">Click</div>

        <svg id="cake-svg" viewBox="0 0 220 190">
          <defs>
            <linearGradient id="plate"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#F3ECE4"/><stop offset="100%" stop-color="#DACDBF"/></linearGradient>
            <linearGradient id="tierTop" x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#FFE3EA"/><stop offset="100%" stop-color="#F4A7B9"/></linearGradient>
            <linearGradient id="tierMid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#FFD1DC"/><stop offset="100%" stop-color="#F08CA3"/></linearGradient>
            <linearGradient id="tierBase"x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#F5EFEB"/><stop offset="100%" stop-color="#E8DDD2"/></linearGradient>
          </defs>
          <ellipse cx="110" cy="178" rx="92" ry="10" fill="url(#plate)"/>
          <rect x="30"  y="128" width="160" height="44" rx="10" fill="url(#tierBase)"/>
          <ellipse cx="110" cy="128" rx="80" ry="10" fill="#FBF6F1"/>
          <path d="M30 128 q80 18 160 0" fill="none" stroke="#DACDBF" stroke-width="2" opacity=".6"/>
          <rect x="52"  y="90"  width="116" height="42" rx="9"  fill="url(#tierMid)"/>
          <ellipse cx="110" cy="90"  rx="58" ry="9"  fill="#FFE0E8"/>
          <path d="M52 108 q58 14 116 0"  fill="none" stroke="#F4A7B9" stroke-width="2" opacity=".5"/>
          <rect x="74"  y="58"  width="72"  height="36" rx="8"  fill="url(#tierTop)"/>
          <ellipse cx="110" cy="58"  rx="36" ry="7"  fill="#FFEFF2"/>
          <circle cx="68"  cy="132" r="4"   fill="#FFD1DC"/>
          <circle cx="150" cy="135" r="3.5" fill="#FFD1DC"/>
          <circle cx="92"  cy="96"  r="3"   fill="#FFEFF2"/>
          <circle cx="138" cy="98"  r="3"   fill="#FFEFF2"/>
          <g class="candle" id="candle" data-lit="false">
            <rect x="104" y="36" width="12" height="24" rx="3" fill="#FFFDF9" stroke="#E8DDD2"/>
            <rect x="104" y="36" width="12" height="6"  rx="3" fill="#F4A7B9"/>
            <line x1="110" y1="36" x2="110" y2="30" stroke="#9C7B67" stroke-width="1.6"/>
          </g>
        </svg>

        <div class="wick-glow" id="wick-glow"></div>
        <div class="flame"     id="flame"></div>
      </div>
    </div>

    <a href="garden.html" class="continue-btn" aria-label="Continue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
      </svg>
    </a>
  </div>

</main>

<script>
(function(){
  "use strict";

  var reduceMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  /* ── Canvases ── */
  var confettiCanvas = document.getElementById('confetti-canvas');
  var cctx = confettiCanvas.getContext('2d');
  var balloonCanvas  = document.getElementById('balloon-canvas');
  var bctx = balloonCanvas.getContext('2d');

  function resizeCanvases(){
    [confettiCanvas, balloonCanvas].forEach(function(c){
      c.width  = window.innerWidth;
      c.height = window.innerHeight;
    });
  }
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);

  /* ── Confetti ── */
  var confettiColors = ['#FFD1DC','#F4A7B9','#FF8FB0','#E8DDD2','#9C7B67','#FDFBF7'];
  var confettiParticles = [];

  function makeConfetti(x, y, count){
    for(var i=0;i<count;i++){
      var angle = Math.random()*Math.PI*2;
      var speed = 4 + Math.random()*8;
      confettiParticles.push({
        x:x, y:y,
        vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-4,
        size:5+Math.random()*6,
        color:confettiColors[Math.floor(Math.random()*confettiColors.length)],
        rot:Math.random()*Math.PI, vr:(Math.random()-.5)*.3,
        life:0, maxLife:140+Math.random()*60,
        shape:Math.random()>.5?'rect':'circle'
      });
    }
  }
  function burstConfetti(big){
    var w=confettiCanvas.width, h=confettiCanvas.height;
    makeConfetti(w/2,h/2,big?160:60);
    makeConfetti(0,h*.2,big?50:25); makeConfetti(w,h*.2,big?50:25);
    makeConfetti(0,h,big?35:18);   makeConfetti(w,h,big?35:18);
  }
  function stepConfetti(){
    cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    confettiParticles = confettiParticles.filter(function(p){
      p.vx*=.992; p.vy=p.vy*.992+.18;
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life++;
      var alpha=1-Math.max(0,(p.life-p.maxLife*.7)/(p.maxLife*.3));
      if(p.life>p.maxLife||p.y>confettiCanvas.height+40) return false;
      cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.rot);
      cctx.globalAlpha=Math.max(0,alpha); cctx.fillStyle=p.color;
      if(p.shape==='rect') cctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*.65);
      else{ cctx.beginPath(); cctx.arc(0,0,p.size/2,0,Math.PI*2); cctx.fill(); }
      cctx.restore(); return true;
    });
    requestAnimationFrame(stepConfetti);
  }
  stepConfetti();

  /* ── Balloons ── */
  var balloonColors = ['#FFD1DC','#F4A7B9','#FF8FB0','#E8DDD2','#9C7B67'];
  var balloons = [];
  function spawnBalloon(delayY){
    var w=balloonCanvas.width, h=balloonCanvas.height;
    return{ x:40+Math.random()*(w-80), y:h+(delayY||0)+Math.random()*200,
      size:28+Math.random()*22, color:balloonColors[Math.floor(Math.random()*balloonColors.length)],
      speed:.5+Math.random()*1.1, wobble:Math.random()*Math.PI*2,
      wobbleSpeed:.01+Math.random()*.02, sway:16+Math.random()*22,
      rot:(Math.random()-.5)*.2 };
  }
  function startBalloons(){
    balloons=[];
    for(var i=0;i<12;i++) balloons.push(spawnBalloon(i*120));
    stepBalloons();
  }
  function drawBalloon(b){
    var x=b.x+Math.sin(b.wobble)*b.sway, fadeStart=balloonCanvas.height*.18;
    var alpha=b.y<fadeStart?Math.max(0,b.y/fadeStart):1;
    bctx.save(); bctx.globalAlpha=alpha; bctx.translate(x,b.y); bctx.rotate(b.rot);
    bctx.strokeStyle='rgba(54,34,20,0.35)'; bctx.lineWidth=1.2;
    bctx.beginPath(); bctx.moveTo(0,b.size*.9);
    bctx.quadraticCurveTo(6,b.size*1.3,0,b.size*1.8); bctx.stroke();
    var g=bctx.createRadialGradient(-b.size*.3,-b.size*.3,b.size*.1,0,0,b.size);
    g.addColorStop(0,'#FFF'); g.addColorStop(.15,b.color); g.addColorStop(1,b.color);
    bctx.fillStyle=g; bctx.beginPath();
    bctx.ellipse(0,0,b.size*.78,b.size,0,0,Math.PI*2); bctx.fill();
    bctx.fillStyle=b.color; bctx.beginPath();
    bctx.moveTo(-5,b.size*.92); bctx.lineTo(5,b.size*.92); bctx.lineTo(0,b.size*1.05);
    bctx.closePath(); bctx.fill(); bctx.restore();
  }
  function stepBalloons(){
    bctx.clearRect(0,0,balloonCanvas.width,balloonCanvas.height);
    balloons.forEach(function(b){
      b.y-=b.speed; b.wobble+=b.wobbleSpeed;
      if(b.y<-60){ var f=spawnBalloon(0); f.y=balloonCanvas.height+60; Object.assign(b,f); }
      drawBalloon(b);
    });
    requestAnimationFrame(stepBalloons);
  }

  /* ── Timer & reveal logic ── */
  var target = new Date("2024-06-15T00:00:00");
  var fired = false;
  var MIN_COUNTDOWN_MS = 3000;
  var pageLoadTime = Date.now();

  function renderUnit(el, value){
    var str = String(value);
    var prev = el.querySelector('.digit');
    if(prev && prev.textContent===str) return;
    if(prev){ prev.classList.add('flip-out'); setTimeout(function(){ prev.remove(); },450); }
    var span=document.createElement('span');
    span.className='digit flip-in'; span.textContent=str;
    el.appendChild(span);
  }

  function tick(){
    var diff = target - new Date();
    var d=0,h=0,m=0,s=0;
    if(diff>0){
      d=Math.floor(diff/86400000);
      h=Math.floor((diff%86400000)/3600000);
      m=Math.floor((diff%3600000)/60000);
      s=Math.floor((diff%60000)/1000);
    }
    document.querySelectorAll('.timer-num').forEach(function(el){
      var u=el.getAttribute('data-unit');
      renderUnit(el, u==='days'?d:u==='hours'?h:u==='minutes'?m:s);
    });
    if(diff<=0 && !fired && Date.now()-pageLoadTime>=MIN_COUNTDOWN_MS){
      fired=true;
      burstConfetti(true);
      setTimeout(revealCelebration, 650);
    }
  }
  tick();
  setInterval(tick,1000);

  var heroIntro  = document.getElementById('hero-intro');
  var celebration= document.getElementById('celebration');
  var bannerWrap = document.getElementById('banner-wrap');

  function revealCelebration(){
    heroIntro.classList.add('hide');
    setTimeout(function(){
      heroIntro.classList.add('collapsed');
      celebration.style.display='flex';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          celebration.classList.add('show');
          bannerWrap.classList.add('show');
          if(!reduceMotion) startBalloons();
        });
      });
    }, 1250);
  }

  /* ── Banner ── */
  var bannerTrack = document.getElementById('banner-track');
  function buildBannerItem(text){
    var item=document.createElement('span'); item.className='banner-item';
    text.split('').forEach(function(ch,idx){
      var s=document.createElement('span'); s.className='banner-letter';
      s.textContent=ch===' '?'\u00A0':ch;
      var d=(idx*.045).toFixed(3)+'s';
      s.style.animationDelay=d+', '+d;
      item.appendChild(s);
    });
    return item;
  }
  for(var i=0;i<6;i++) bannerTrack.appendChild(buildBannerItem('Happy Birthday Scarlet'));

  /* ── Candle ── */
  var candle     = document.getElementById('candle');
  var flame      = document.getElementById('flame');
  var wickGlow   = document.getElementById('wick-glow');
  var candleNote = document.getElementById('candle-note');
  var cakeWrap   = candle.closest('svg').parentElement;

  function spawnSmoke(){
    for(var i=0;i<6;i++){
      (function(i){ setTimeout(function(){
        var s=document.createElement('div'); s.className='smoke';
        s.style.setProperty('--dx',(Math.random()*30-15)+'px');
        s.style.left=(110+(Math.random()*10-5))+'px';
        cakeWrap.appendChild(s);
        setTimeout(function(){ s.remove(); },1700);
      },i*120); })(i);
    }
  }
  function toggleCandle(){
    var lit=candle.getAttribute('data-lit')==='true';
    candle.setAttribute('data-lit', lit?'false':'true');
    flame.classList.toggle('lit',!lit);
    wickGlow.classList.toggle('lit',!lit);
    if(candleNote){ if(!lit) candleNote.classList.add('hide'); else{ spawnSmoke(); candleNote.classList.remove('hide'); } }
  }
  candle.addEventListener('click', toggleCandle);
  candle.addEventListener('touchend',function(e){ e.preventDefault(); toggleCandle(); },{passive:false});

})();
</script>
</body>
</html>
