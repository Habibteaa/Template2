<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wish Jar ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:radial-gradient(ellipse at 50% 38%,#FDFBF7 0%,#EDE0D4 55%,#E8DDD2 100%);
  font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  position:relative;min-height:100vh;user-select:none;
}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#heartCanvas{z-index:100;}
#sparkCanvas{z-index:0;}
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:1;}
.b1{width:520px;height:520px;background:radial-gradient(#f5c2d0,#f0b0c0);opacity:.2;top:-200px;left:-160px;animation:bf 10s ease-in-out infinite;}
.b2{width:400px;height:400px;background:radial-gradient(#d4a5b5,#c898a8);opacity:.18;bottom:-130px;right:-100px;animation:bf 13s ease-in-out infinite 3.5s;}
.b3{width:300px;height:300px;background:radial-gradient(#e8c8a0,#d8b890);opacity:.16;top:40%;left:65%;animation:bf 8s ease-in-out infinite 6s;}
@keyframes bf{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(22px,-32px) scale(1.07);}}

/* ── Adjusted Layout for Responsiveness & Top Title ────────────────────────────── */
.scene{
  position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;
  width: 100%; height: 100vh; padding: 6vh 20px 4vh;
}

.header-group {
  text-align: center;
  margin-bottom: 4vh; /* Removed auto margin to stop pushing the jar too far down */
  z-index: 20;
}

h1{
  font-family:'Berkshire Swash',cursive;
  font-size:clamp(1.8rem,6vw,3rem);
  background:linear-gradient(110deg,#6B2D00 0%,#A0320A 18%,#C0186A 38%,#FF5FA0 55%,#FF90B8 68%,#C0186A 80%,#6B2D00 100%);
  background-size:280% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 5s linear infinite;
  letter-spacing:.03em;margin-bottom:4px;
}
@keyframes shimmer{to{background-position:-280% center;}}

#subtitle{
  font-size:clamp(0.85rem, 3vw, 1rem);color:#7A5C4E;letter-spacing:.05em;font-weight:500;
  transition:opacity .6s,color .5s;text-align:center;padding:0 16px;min-height:1.4em;
}

/* ── Jar layout ────────────────────────────── */
.jar-wrap{
  position:relative;width:220px;height:300px;
  cursor:pointer; margin-bottom: auto; margin-top: 0; /* Keeps the jar slightly higher */
  -webkit-tap-highlight-color:transparent;
}
.glow-ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-48%);
  width:180px;height:240px;
  background:radial-gradient(ellipse,rgba(255,140,180,.38) 0%,rgba(255,150,190,.12) 50%,transparent 72%);
  border-radius:50%;pointer-events:none;
  animation:jg 3.8s ease-in-out infinite;
}
@keyframes jg{0%,100%{opacity:.55;transform:translate(-50%,-48%) scale(1);}50%{opacity:1;transform:translate(-50%,-48%) scale(1.13);}}

.shadow{
  width:160px;height:20px;
  background:radial-gradient(ellipse,rgba(80,42,18,.22) 0%,transparent 72%);
  border-radius:50%;margin:-6px auto 0;
}

/* Lid CSS animation via class on jarWrap */
#lidG{
  transform-box:fill-box;
  transform-origin:right bottom;
  transition:transform .72s cubic-bezier(.34,1.56,.64,1);
}
.lid-open #lidG{transform:rotate(-42deg) translate(-4px,-6px);}

/* ── Modal ────────────────────────────────── */
.mo{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:rgba(60,25,15,.38);backdrop-filter:blur(9px);
  opacity:0;pointer-events:none;
  transition:opacity .45s;
}
.mo.on{opacity:1;pointer-events:auto;}
.mc{
  background:linear-gradient(155deg,#FFFCF8 0%,#FFF4F7 60%,#FFEDF2 100%);
  border-radius:28px;padding:42px 34px 34px;
  max-width:350px;width:92%;text-align:center;
  box-shadow:0 28px 80px rgba(160,50,75,.16),0 4px 16px rgba(220,100,130,.1),inset 0 0 0 1.5px rgba(255,170,200,.28);
  transform:scale(.83) translateY(28px);
  transition:transform .48s cubic-bezier(.34,1.56,.64,1);
}
.mo.on .mc{transform:scale(1) translateY(0);}
.wi{font-size:2.4rem;margin-bottom:14px;display:block;line-height:1;}
.wt{font-size:clamp(0.9rem, 4vw, 1rem);line-height:1.8;color:#4E2A22;margin-bottom:28px;font-style:italic;}
.wn{display:block;font-size:.72rem;font-weight:600;color:#C06080;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.wb{
  font-family:'DM Sans',sans-serif;font-weight:500;
  background:linear-gradient(135deg,#FFBAD0,#FF6FA0);
  color:#fff;border:none;padding:12px 34px;
  border-radius:32px;cursor:pointer;font-size:.88rem;
  box-shadow:0 6px 22px rgba(255,80,140,.32);
  transition:transform .2s,box-shadow .2s;
}
.wb:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,80,140,.42);}
.wb:active{transform:translateY(0);}

/* ── Arrow button ─────────────────────────── */
#arrowBtn{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%) translateY(20px);
  width:64px;height:64px;
  background:linear-gradient(140deg,#FFD1DC,#FF8FB0);
  border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 30px rgba(255,95,145,.45),0 2px 8px rgba(255,95,145,.25);
  opacity:0;pointer-events:none;z-index:150;
  transition:opacity .9s ease,transform .9s cubic-bezier(.22,1.1,.36,1);
}
#arrowBtn.show{
  opacity:1;pointer-events:auto;
  transform:translateX(-50%) translateY(0);
  animation:abf 2.6s ease-in-out infinite;
}
@keyframes abf{
  0%,100%{transform:translateX(-50%) translateY(0) scale(1);box-shadow:0 8px 30px rgba(255,95,145,.45);}
  50%{transform:translateX(-50%) translateY(-12px) scale(1.04);box-shadow:0 18px 40px rgba(255,95,145,.55);}
}
#arrowBtn svg{width:26px;height:26px;fill:#fff;margin-left:2px;}
</style>
</head>
<body>

<canvas id="sparkCanvas"></canvas>
<canvas id="heartCanvas"></canvas>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="scene">
  <div class="header-group">
    <h1>Wishes For You</h1>
    <p id="subtitle">✨ Tap the jar ✨</p>
  </div>

  <div class="jar-wrap" id="jarWrap">
    <div class="glow-ring"></div>
    <svg id="jarSVG" width="220" height="298" viewBox="0 0 220 298" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#b8d8e8" stop-opacity=".72"/>
          <stop offset="26%"  stop-color="#e8f6fc" stop-opacity=".95"/>
          <stop offset="66%"  stop-color="#c2dce8" stop-opacity=".78"/>
          <stop offset="100%" stop-color="#9ec4d6" stop-opacity=".58"/>
        </linearGradient>
        <linearGradient id="lG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#dfc87e"/>
          <stop offset="48%"  stop-color="#b89828"/>
          <stop offset="100%" stop-color="#8a7010"/>
        </linearGradient>
        <linearGradient id="lGH" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#f0df9c" stop-opacity=".7"/>
          <stop offset="100%" stop-color="#d4b050" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="iGlow" cx="50%" cy="68%" r="48%">
          <stop offset="0%"   stop-color="#ffaad4" stop-opacity=".5"/>
          <stop offset="60%"  stop-color="#ff80c0" stop-opacity=".15"/>
          <stop offset="100%" stop-color="#ff69b4" stop-opacity="0"/>
        </radialGradient>
        <filter id="df" x="-25%" y="-12%" width="150%" height="130%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
          <feOffset dx="2" dy="7" result="offsetblur"/>
          <feFlood flood-color="#7a5038" flood-opacity=".18"/>
          <feComposite in2="offsetblur"/>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="jClip">
          <path d="M72,80 Q65,85 58,96 L46,255 Q44,272 110,275 Q176,272 174,255 L162,96 Q155,85 148,80 Z"/>
        </clipPath>
        <radialGradient id="glassTop" cx="38%" cy="20%" r="55%">
          <stop offset="0%" stop-color="white" stop-opacity=".28"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <g id="lidG">
        <ellipse cx="110" cy="24" rx="13" ry="6" fill="url(#lG)"/>
        <rect x="103" y="24" width="14" height="14" rx="3" fill="url(#lG)"/>
        <rect x="62"  y="36" width="96" height="21" rx="5" fill="url(#lG)"/>
        <rect x="62"  y="37" width="96" height="6"  rx="3" fill="url(#lGH)"/>
        <ellipse cx="110" cy="57" rx="50" ry="9.5" fill="#c09820" opacity=".42"/>
        <ellipse cx="110" cy="55" rx="50" ry="7.5" fill="none" stroke="#ead890" stroke-width="1.2" opacity=".5"/>
        <line x1="82"  y1="36" x2="82"  y2="57" stroke="#a88010" stroke-width=".7" opacity=".35"/>
        <line x1="138" y1="36" x2="138" y2="57" stroke="#a88010" stroke-width=".7" opacity=".35"/>
      </g>

      <path d="M74,66 L72,80 L148,80 L146,66 Z" fill="url(#gG)" stroke="#8cc0d0" stroke-width="1"/>
      <path d="M78,66 L76,80 L88,80 L88,66 Z" fill="white" opacity=".42"/>
      <rect x="68" y="77" width="84" height="7" rx="1.5" fill="#a8d0e0" opacity=".52"/>

      <g filter="url(#df)">
        <path id="bodyPath" d="M72,80 Q65,85 58,96 L46,255 Q44,272 110,275 Q176,272 174,255 L162,96 Q155,85 148,80 Z"
              fill="url(#gG)" stroke="#88b8cc" stroke-width="1.6"/>

        <ellipse cx="110" cy="188" rx="60" ry="88" fill="url(#iGlow)" clip-path="url(#jClip)"/>
        <ellipse cx="110" cy="150" rx="62" ry="90" fill="url(#glassTop)" clip-path="url(#jClip)"/>

        <path d="M56,108 Q52,152 50,210 Q54,215 63,208 Q61,152 68,106 Z" fill="white" opacity=".3"/>
        <path d="M158,122 Q160,148 159,170 Q163,170 164,148 Q163,122 161,122 Z" fill="white" opacity=".22"/>
        <path d="M82,90 Q80,120 79,160 Q82,160 83,120 Q83,90 83,90 Z" fill="white" opacity=".12"/>

        <ellipse cx="110" cy="264" rx="61" ry="12" fill="#90bcd0" opacity=".25"/>
        <ellipse cx="110" cy="268" rx="50" ry="9"  fill="#c2dce8" opacity=".35"/>
        <ellipse cx="110" cy="269" rx="35" ry="5"  fill="white"   opacity=".15"/>
      </g>

      <g id="notesIn" clip-path="url(#jClip)">
        <g transform="rotate(-20,82,208)">
          <rect x="64" y="196" width="36" height="26" rx="3.5" fill="#FFB6C1"/>
          <path d="M64,208 L82,218 L100,208" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.3"/>
          <line x1="71" y1="213" x2="93" y2="213" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
          <line x1="71" y1="218" x2="89" y2="218" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        </g>
        <g transform="rotate(14,116,222)">
          <rect x="98" y="210" width="36" height="26" rx="3.5" fill="#DDA0DD"/>
          <path d="M98,222 L116,232 L134,222" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.3"/>
          <line x1="105" y1="226" x2="127" y2="226" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        </g>
        <g transform="rotate(-9,136,202)">
          <rect x="118" y="190" width="36" height="26" rx="3.5" fill="#FFDAB9"/>
          <path d="M118,202 L136,212 L154,202" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.3"/>
          <line x1="125" y1="207" x2="147" y2="207" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        </g>
        <g transform="rotate(24,84,244)">
          <rect x="66" y="232" width="36" height="26" rx="3.5" fill="#B8E4C9"/>
          <path d="M66,244 L84,254 L102,244" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.3"/>
          <line x1="73" y1="248" x2="95" y2="248" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        </g>
        <g transform="rotate(-26,118,248)">
          <rect x="100" y="236" width="36" height="26" rx="3.5" fill="#FFF3A3"/>
          <path d="M100,248 L118,258 L136,248" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.3"/>
          <line x1="107" y1="252" x2="129" y2="252" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        </g>
        <g transform="rotate(16,142,232)">
          <rect x="124" y="220" width="36" height="26" rx="3.5" fill="#B8D4F5"/>
          <path d="M124,232 L142,242 L160,232" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="1.3"/>
          <line x1="131" y1="236" x2="153" y2="236" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
        </g>
      </g>
    </svg>
  </div>

  <div class="shadow"></div>
</div>

<div class="mo" id="modal">
  <div class="mc">
    <span class="wi" id="mIcon">💌</span>
    <span class="wn" id="mLabel">Wish #1</span>
    <p class="wt" id="mText"></p>
    <button class="wb" id="mClose">Close ✦</button>
  </div>
</div>

<button id="arrowBtn" onclick="window.location.href='letter.html'" aria-label="Continue to next page">
  <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
</button>

<script>
(function(){
'use strict';

// ── Canvas setup ───────────────────────────────────────
const sc=document.getElementById('sparkCanvas'),sx=sc.getContext('2d');
const hc=document.getElementById('heartCanvas'),hx=hc.getContext('2d');
function resize(){sc.width=hc.width=innerWidth;sc.height=hc.height=innerHeight;}
resize();addEventListener('resize',resize);

// ── Ambient sparkles ───────────────────────────────────
const SP=Array.from({length:60},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()*1.7+.3,op:Math.random()*.6+.1,
  dx:(Math.random()-.5)*.45,dy:(Math.random()-.5)*.45,
  dt:(Math.random()-.5)*.014
}));
(function loopSparks(){
  sx.clearRect(0,0,sc.width,sc.height);
  SP.forEach(s=>{
    s.x+=s.dx;s.y+=s.dy;s.op+=s.dt;
    if(s.op<.06||s.op>.82)s.dt*=-1;
    if(s.x<0)s.x=sc.width; if(s.x>sc.width)s.x=0;
    if(s.y<0)s.y=sc.height;if(s.y>sc.height)s.y=0;
    const g=sx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2);
    g.addColorStop(0,`rgba(200,90,120,${s.op})`);
    g.addColorStop(1,`rgba(200,90,120,0)`);
    sx.beginPath();sx.arc(s.x,s.y,s.r*2,0,Math.PI*2);sx.fillStyle=g;sx.fill();
  });
  requestAnimationFrame(loopSparks);
})();

// ── Wish data ──────────────────────────────────────────
const WISHES=[
  {icon:'🌹',text:'May every morning greet you with warmth and every night carry you gently to rest. You deserve all the softness this world can offer, and then some.'},
  {icon:'💫',text:'I wish you the kind of joy that lingers — the quiet, golden kind that fills ordinary moments and turns them quietly extraordinary.'},
  {icon:'🌸',text:'May you always find your way back to yourself, even in the hardest seasons. You are your own safest, warmest, most beautiful home.'},
  {icon:'✨',text:'I wish you love that is patient and kind — the kind that sees every part of you and still chooses you, again and again, every single day.'},
  {icon:'🌙',text:'May your dreams be vivid, your laughter echo far, and your heart always be held tenderly by someone who cherishes every last piece of you.'},
  {icon:'💕',text:'I wish you a life woven with beautiful memories, deep connections, and the courage to chase everything that makes your soul light up and sing.'}
];
const NOTE_COLORS=['#FFB6C1','#DDA0DD','#FFDAB9','#B8E4C9','#FFF3A3','#B8D4F5'];

// ── State ──────────────────────────────────────────────
let jarOpened=false,activeIdx=null,heartsTriggered=false;
const read=new Set();
const floaters=new Array(6).fill(null);

// ── Jar click → open ───────────────────────────────────
const jarWrap=document.getElementById('jarWrap');
const subtitle=document.getElementById('subtitle');
const notesIn=document.getElementById('notesIn');

jarWrap.addEventListener('click',()=>{
  if(jarOpened)return;
  jarOpened=true;
  jarWrap.classList.add('lid-open');
  subtitle.textContent='✦ Your wishes are releasing… ✦';
  setTimeout(()=>{
    notesIn.style.transition='opacity .55s ease';
    notesIn.style.opacity='0';
    setTimeout(launchNotes,150);
  },650);
});

// ── Helper: jar mouth center in viewport px ────────────
function jarMouth(){
  const r=jarWrap.getBoundingClientRect();
  return{x:r.left+r.width*.5,y:r.top+r.height*.31};
}

// ── Launch 6 floating notes (with bouncing behavior) ───
function launchNotes(){
  const c=jarMouth();
  for(let i=0;i<6;i++){
    (function(idx){
      setTimeout(()=>{
        const el=document.createElement('div');
        el.style.cssText=[
          'position:fixed','width:48px','height:34px',
          'cursor:pointer','z-index:50',
          `left:${c.x-24}px`,`top:${c.y-17}px`,
          'will-change:transform,left,top',
          '-webkit-tap-highlight-color:transparent'
        ].join(';');
        el.innerHTML=`<svg width="48" height="34" viewBox="0 0 48 34" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="46" height="32" rx="4.5" fill="${NOTE_COLORS[idx]}" stroke="rgba(255,255,255,.65)" stroke-width="1.3"/>
          <path d="M1,12 L24,22 L47,12" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.4"/>
          <line x1="10" y1="17" x2="38" y2="17" stroke="rgba(255,255,255,.45)" stroke-width="1.1"/>
          <line x1="10" y1="23" x2="33" y2="23" stroke="rgba(255,255,255,.45)" stroke-width="1.1"/>
          <line x1="10" y1="27" x2="28" y2="27" stroke="rgba(255,255,255,.35)" stroke-width=".9"/>
        </svg>`;
        document.body.appendChild(el);
        
        // SLOWED DOWN VELOCITIES
        const state={
          el,
          x:c.x-24,y:c.y-17,
          vx:(Math.random()-.5)*2,        // Slower horizontal
          vy:-(Math.random()*1.5+1.5),    // Slower upward burst
          rot:Math.random()*360,
          vr:(Math.random()-.5)*2,        // Slower rotation
          t:Math.random()*Math.PI*2,
          paused:false,
          hidden:false
        };
        
        // Ensure minimum speed so they don't get stuck (adjusted for new slower speeds)
        if (Math.abs(state.vx) < 0.8) state.vx += (state.vx < 0 ? -0.8 : 0.8);
        if (Math.abs(state.vy) < 0.8) state.vy += (state.vy < 0 ? -0.8 : 0.8);
        
        floaters[idx]=state;
        el.addEventListener('click',e=>{e.stopPropagation();openNote(idx);});
        animNote(state);
      },idx*300);
    })(i);
  }
}

// ── Animate each note (bouncing within the frame) ──────
function animNote(s){
  (function loop(){
    if(!s.paused && !s.hidden){
      s.t+=.024;
      s.x+=s.vx;
      s.y+=s.vy;
      s.rot+=s.vr;

      // Frame Boundary Collision Detection (Bouncing)
      if (s.x <= 10) { s.x = 10; s.vx *= -1; }
      if (s.x >= innerWidth - 58) { s.x = innerWidth - 58; s.vx *= -1; }
      if (s.y <= 10) { s.y = 10; s.vy *= -1; }
      if (s.y >= innerHeight - 44) { s.y = innerHeight - 44; s.vy *= -1; }

      s.el.style.left=s.x+'px';
      s.el.style.top=s.y+'px';
      s.el.style.transform=`rotate(${s.rot}deg)`;
    }
    requestAnimationFrame(loop);
  })();
}

// ── Modal open ─────────────────────────────────────────
const modal=document.getElementById('modal');
const mIcon=document.getElementById('mIcon');
const mLabel=document.getElementById('mLabel');
const mText=document.getElementById('mText');

function openNote(idx){
  const s=floaters[idx];
  if(!s)return;
  s.paused=true;
  activeIdx=idx;
  mIcon.textContent=WISHES[idx].icon;
  mLabel.textContent=`Wish #${idx+1} of 6`;
  mText.textContent=WISHES[idx].text;
  modal.classList.add('on');
}

// ── Modal close & Note Disappearance ───────────────────
document.getElementById('mClose').addEventListener('click',closeModal);
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});

function closeModal(){
  modal.classList.remove('on');
  if(activeIdx!==null){
    const s=floaters[activeIdx];
    if(s){
      s.paused=false;
      // Shrink and disappear the note
      s.hidden=true;
      s.el.style.transition='transform 0.6s ease, opacity 0.6s ease';
      s.el.style.opacity='0';
      s.el.style.transform=`rotate(${s.rot}deg) scale(0)`;
      s.el.style.pointerEvents='none';
    }
    read.add(activeIdx);
    activeIdx=null;
  }
  if(read.size===6&&!heartsTriggered){
    heartsTriggered=true;
    setTimeout(startFinale,700);
  }
}

// ── Finale: tilt + heart shower + Arrow Button Appear ──
function startFinale(){
  // Jar tilt
  const jarSVG=document.getElementById('jarSVG');
  jarSVG.style.transition='transform .42s cubic-bezier(.36,.07,.19,.97)';
  jarSVG.style.transform='rotate(-12deg) translateX(-14px)';
  setTimeout(()=>{
    jarSVG.style.transition='transform .5s ease';
    jarSVG.style.transform='rotate(3deg) translateX(4px)';
    setTimeout(()=>{
      jarSVG.style.transform='rotate(0deg)';
    },300);
  },420);

  subtitle.textContent='💕 All your wishes received with love 💕';
  spawnHearts();
  
  // Triggers the Arrow Button to Show up and point to next.html
  setTimeout(()=>{
    document.getElementById('arrowBtn').classList.add('show');
  },4600);
}

// ── Heart shower ───────────────────────────────────────
let hearts=[];
let heartRAF=null;

function spawnHearts(){
  for(let i=0;i<95;i++){
    setTimeout(()=>{
      hearts.push({
        x:innerWidth*.2+Math.random()*innerWidth*.6,
        y:-12,
        vx:(Math.random()-.5)*3.8,
        vy:Math.random()*2.8+1.6,
        sz:Math.random()*18+7,
        rot:Math.random()*360,
        vr:(Math.random()-.5)*6,
        col:Math.random()<.6?'#FF69B4':Math.random()<.5?'#FF1493':'#FFB6C1',
        life:0,
        max:110+Math.random()*120
      });
    },i*42);
  }
  if(!heartRAF)heartRAF=requestAnimationFrame(loopHearts);
}

function drawHeart(ctx,x,y,sz,rot,col,op){
  ctx.save();
  ctx.globalAlpha=op;
  ctx.translate(x,y);
  ctx.rotate(rot*Math.PI/180);
  ctx.fillStyle=col;
  ctx.beginPath();
  const k=sz*.055;
  ctx.moveTo(0,k*3.5);
  ctx.bezierCurveTo(-k*5,-k*1.5,-k*10.5,k*2.5,0,k*9.5);
  ctx.bezierCurveTo(k*10.5,k*2.5,k*5,-k*1.5,0,k*3.5);
  ctx.fill();
  // Small shine
  ctx.globalAlpha=op*.28;
  ctx.fillStyle='white';
  ctx.beginPath();
  ctx.ellipse(-k*2,k*.5,k*1.2,k*.8,-0.6,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function loopHearts(){
  hx.clearRect(0,0,hc.width,hc.height);
  hearts=hearts.filter(h=>h.life<h.max);
  hearts.forEach(h=>{
    h.x+=h.vx;h.y+=h.vy;
    h.rot+=h.vr;h.life++;
    const f=h.life/h.max;
    const op=f<.65?1:Math.max(0,1-(f-.65)/.35);
    drawHeart(hx,h.x,h.y,h.sz,h.rot,h.col,op);
  });
  if(hearts.length>0)heartRAF=requestAnimationFrame(loopHearts);
  else{heartRAF=null;}
}

})();
</script>
