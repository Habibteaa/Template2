<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Heart Catcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --cream-base:#FDFBF7;
      --cream-deep:#F5EFEB;
      --taupe:#E8DDD2;
      --pink-soft:#FFD1DC;
      --pink-deep:#F4A7B9;
      --pink-neon:#FF8FB0;
      --brown-primary:#362214;
      --brown-muted:#9C7B67;
    }

    *{ box-sizing:border-box; }

    html, body {
      margin:0; padding:0;
      width:100%; height:100%;
      min-height:100vh; min-height:100dvh;
      background:
        radial-gradient(120% 90% at 50% -10%, var(--cream-base) 0%, var(--cream-deep) 55%, var(--taupe) 100%);
      font-family:'DM Sans', sans-serif;
      color:var(--brown-primary);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .glow-blob{
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      opacity:.52;
      pointer-events:none;
      z-index:0;
      animation:blobDrift 18s ease-in-out infinite alternate;
    }
    .glow-blob.a{ width:420px;height:420px;background:var(--pink-soft);top:-130px;left:-110px; }
    .glow-blob.b{ width:380px;height:380px;background:var(--pink-deep);bottom:-150px;right:-110px;animation-delay:3s; }
    .glow-blob.c{ width:260px;height:260px;background:var(--taupe);top:38%;left:58%;animation-delay:6s; }
    @keyframes blobDrift{
      0%{ transform:translate(0,0) scale(1); }
      100%{ transform:translate(30px,-20px) scale(1.08); }
    }

    /* ── CHANGED: title pinned to top, shimmer style matching guitar/piano pages ── */
    #instructions {
      position: absolute;
      top: 4vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Berkshire Swash', cursive;
      font-size: clamp(2rem, 5.2vw, 3.6rem);
      font-weight: 400;
      letter-spacing: .02em;
      white-space: nowrap;
      background: linear-gradient(135deg, #5c2e16, #bd6528, var(--pink-neon), #5c2e16);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0%   center; }
      100% { background-position: 200% center; }
    }

    /* ── CHANGED: game area made significantly larger ── */
    #gameArea{
      position: relative;
      z-index: 10;
      width: min(520px, 95vw);
      height: min(560px, 74vh);
      background:
        linear-gradient(180deg, rgba(253,251,247,.96) 0%, rgba(245,239,235,.98) 100%);
      border: 2px solid var(--pink-deep);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 1px 0 rgba(255,255,255,.7) inset,
        0 20px 50px -18px rgba(54,34,20,.22),
        0 0 0 1px rgba(255,143,176,.12);
      margin-top: 2vh; /* breathing room below title */
    }

    .heart{
      position:absolute;
      font-size:32px;
      color:var(--pink-neon);
      text-shadow:
        0 0 8px rgba(255,143,176,.7),
        0 0 20px rgba(255,143,176,.35);
      animation-name:fall, heartPulse;
      animation-timing-function:linear, ease-in-out;
      animation-iteration-count:1, infinite;
      animation-fill-mode:forwards, none;
    }
    .heart.caught{
      display:none !important;
      opacity:0 !important;
      animation:none !important;
    }
    @keyframes fall{
      0%{ top:-40px; }
      100%{ top:580px; }
    }
    @keyframes heartPulse{
      0%,100%{ transform:scale(1); filter:brightness(1); }
      50%{ transform:scale(1.22); filter:brightness(1.12); }
    }

    .basket{
      position:absolute;
      bottom:12px;
      left:220px;   /* ── CHANGED: centred for wider game area ── */
      font-size:44px;
      filter:
        drop-shadow(0 0 6px rgba(244,167,185,.6))
        drop-shadow(0 4px 8px rgba(54,34,20,.18));
    }

    #scoreBadge{
      position:absolute;
      top:12px; right:16px;
      font-family:'Berkshire Swash',cursive;
      font-size:16px;
      color:var(--pink-neon);
      text-shadow:0 0 8px rgba(255,143,176,.55);
      z-index:5;
      pointer-events:none;
    }

    #popup{
      display:none;
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      background:rgba(253,251,247,.97);
      border:1.5px solid var(--pink-deep);
      padding:clamp(28px,5vh,44px) clamp(32px,7vw,60px);
      border-radius:26px;
      text-align:center;
      box-shadow:
        0 1px 0 rgba(255,255,255,.8) inset,
        0 20px 50px -16px rgba(244,167,185,.55),
        0 0 60px -10px rgba(255,143,176,.3);
      z-index:10;
      overflow:hidden;
      width: 88%;
    }

    /* ── CHANGED: popup heading and body text larger, centred ── */
    #popup h2{
      font-family:'Berkshire Swash', cursive;
      font-size: clamp(24px, 5.5vw, 36px);
      font-weight:400;
      margin:0 0 10px;
      text-align: center;
      background:linear-gradient(120deg,var(--pink-neon),var(--pink-deep) 50%,var(--pink-neon));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:textGlow 2.4s ease-in-out infinite;
    }
    #popup p{
      font-size: clamp(15px, 3.2vw, 20px);
      color:var(--brown-muted);
      margin:0 0 24px;
      font-weight:500;
      text-align: center;
    }
    @keyframes textGlow{
      0%,100%{ filter:drop-shadow(0 0 6px rgba(255,143,176,.35)); }
      50%{ filter:drop-shadow(0 0 18px rgba(255,143,176,.9)); }
    }

    .popup-sparkle{
      position:absolute;
      width:8px; height:8px;
      border-radius:50%;
      background:radial-gradient(circle, #FFFFFF 0%, var(--pink-neon) 55%, transparent 75%);
      pointer-events:none;
      opacity:0;
      animation:sparkleTwinkle 1.8s ease-in-out infinite, sparkleDrift 6s linear infinite;
    }
    @keyframes sparkleTwinkle{
      0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
      50%{ opacity:1; transform:scale(1.15) rotate(180deg); }
    }
    @keyframes sparkleDrift{
      0%{ transform:translate(0,0); }
      100%{ transform:translate(60px,-40px); }
    }

    .continue-btn{
      margin-top:4px;
      margin-left:auto;
      margin-right:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      width:106px; height:106px;
      border-radius:50%;
      position:relative;
      background:linear-gradient(135deg,var(--pink-neon),var(--pink-deep));
      box-shadow:
        0 1px 0 rgba(255,255,255,.5) inset,
        0 14px 28px -10px rgba(244,167,185,.7);
      text-decoration:none;
      cursor:pointer;
      border:none;
      animation:arrowFloat 2.4s ease-in-out infinite;
      transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
    }
    .continue-btn::before{
      content:'';
      position:absolute;
      inset:-12px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--pink-neon),var(--pink-deep));
      opacity:.4;
      filter:blur(14px);
      z-index:-1;
      animation:arrowGlowPulse 2.4s ease-in-out infinite;
    }
    .continue-btn svg{
      width:42px; height:42px;
      color:var(--cream-base);
      transition:transform .25s ease;
    }
    .continue-btn:hover{
      transform:translateY(-5px) scale(1.08) rotate(-4deg);
      box-shadow:
        0 1px 0 rgba(255,255,255,.6) inset,
        0 20px 40px -10px rgba(255,143,176,.85);
      filter:brightness(1.05);
    }
    .continue-btn:hover svg{ transform:translateX(4px) rotate(8deg); }
    .continue-btn:active{ transform:translateY(-2px) scale(.95); }

    @keyframes arrowFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-7px); }
    }
    @keyframes arrowGlowPulse{
      0%,100%{ opacity:.3; transform:scale(1); }
      50%{ opacity:.6; transform:scale(1.18); }
    }

    @media (max-width:420px){
      #gameArea{ border-radius:18px; }
      .basket{ font-size:36px; }
      .heart{ font-size:26px; }
    }
    @media (prefers-reduced-motion:reduce){
      .glow-blob, #instructions, .heart, .popup-sparkle,
      .continue-btn, .continue-btn::before{ animation:none !important; }
    }
  </style>
</head>
<body>
  <div class="glow-blob a"></div>
  <div class="glow-blob b"></div>
  <div class="glow-blob c"></div>

  <h2 id="instructions">Catch the falling hearts…</h2>

  <div id="gameArea">
    <div id="scoreBadge">❤ 0</div>
    <div class="basket" id="basket">🧺</div>

    <div id="popup">
      <h2>You caught them all&nbsp;❤</h2>
      <p>Every heart was meant for you.</p>
      <button class="continue-btn" onclick="goToFinal()" aria-label="Continue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const gameArea   = document.getElementById('gameArea');
    const basket     = document.getElementById('basket');
    const popup      = document.getElementById('popup');
    const scoreBadge = document.getElementById('scoreBadge');

    let basketPos = 220;   // centred for wider game area
    let collected = 0;
    const totalHearts   = 40;
    const targetCollect = 8;
    let gameActive = true;

    function updateScore(){
      scoreBadge.textContent = `❤ ${collected}`;
    }

    function createHeart(){
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤';
      // hearts can spawn across the wider area
      heart.style.left = Math.random() * 480 + 'px';

      const dur = (3.4 + Math.random() * 1.4).toFixed(2);
      heart.style.animationDuration = `${dur}s, 1.1s`;

      gameArea.appendChild(heart);

      const fallInterval = setInterval(() => {
        const heartRect  = heart.getBoundingClientRect();
        const basketRect = basket.getBoundingClientRect();

        const isCaught = (
          heartRect.bottom >= basketRect.top  &&
          heartRect.top    <= basketRect.bottom &&
          heartRect.right  >= basketRect.left  &&
          heartRect.left   <= basketRect.right
        );

        if (isCaught) {
          clearInterval(fallInterval);
          heart.remove();
          collected++;
          updateScore();
          if (collected === targetCollect) {
            setTimeout(showWin, 300);
          }
          return;
        }

        const gameAreaRect = gameArea.getBoundingClientRect();
        if (heartRect.top > gameAreaRect.bottom) {
          clearInterval(fallInterval);
          heart.remove();
        }
      }, 30);
    }

    function spawnPopupSparkles(){
      for (let i = 0; i < 12; i++){
        const s = document.createElement('div');
        s.className = 'popup-sparkle';
        s.style.left  = (Math.random() * 86 + 4) + '%';
        s.style.top   = (Math.random() * 80 + 4) + '%';
        s.style.animationDelay = (Math.random() * 1.8) + 's';
        s.style.animationDuration = `${1.4 + Math.random() * 0.8}s, ${4 + Math.random() * 3}s`;
        popup.appendChild(s);
      }
    }

    function showWin(){
      spawnPopupSparkles();
      popup.style.display = 'block';
    }

    function startGame(){
      for (let i = 0; i < totalHearts; i++){
        setTimeout(createHeart, i * 1000);
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft')  moveLeft();
      if (e.key === 'ArrowRight') moveRight();
    });

    function moveLeft(){
      basketPos = Math.max(basketPos - 30, 0);
      basket.style.left = basketPos + 'px';
    }
    function moveRight(){
      basketPos = Math.min(basketPos + 30, 470);  // updated boundary
      basket.style.left = basketPos + 'px';
    }

    gameArea.addEventListener('touchmove', (e) => {
      const rect   = gameArea.getBoundingClientRect();
      const touchX = e.touches[0].clientX - rect.left;
      basketPos = Math.max(0, Math.min(470, touchX - 22));  // updated boundary
      basket.style.left = basketPos + 'px';
      e.preventDefault();
    }, { passive: false });

    function goToFinal(){
      window.location.href = 'maze.html';
    }

    startGame();
  </script>
</body>
</html>
