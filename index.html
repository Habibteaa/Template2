<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hear Me Once</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #FDFBF7;
      --cream-deep: #F5EFEB;
      --taupe: #E8DDD2;
      --pink: #FFD1DC;
      --pink-deep: #F4A7B9;
      --pink-neon: #FF8FB0;
      --brown: #362214;
      --brown-muted: #9C7B67;
      --metal-1: #F3ECE4;
      --metal-2: #DACDBF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(circle at center, var(--cream) 30%, var(--cream-deep) 100%);
      font-family: 'DM Sans', sans-serif;
      color: var(--brown);
      overflow: hidden;
      position: relative;
    }

    /* â”€â”€ LAYER 0: WARM STUDIO WINDOW GLOW â”€â”€ */
    .studio-glow {
      position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
      width: 90vw; height: 70vh;
      background: radial-gradient(ellipse at center, rgba(255,225,200,0.55) 0%, rgba(255,209,220,0.18) 45%, rgba(255,253,247,0) 75%);
      filter: blur(40px); pointer-events: none; z-index: 0;
      animation: glowBreath 16s ease-in-out infinite alternate;
    }
    @keyframes glowBreath {
      0% { opacity: 0.75; transform: translateX(-50%) scale(1); }
      100% { opacity: 1; transform: translateX(-50%) scale(1.08); }
    }

    /* â”€â”€ LAYER 1: GLOW-IN-THE-DARK CONSTELLATION MONOGRAM (ZM) â”€â”€ */
    #constellation {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1; pointer-events: none;
      width: min(80vw, 80vh); height: min(80vw, 80vh);
    }
    .star-node {
      fill: var(--brown);
      opacity: 0.07;
      transition: fill 0.6s ease, opacity 0.6s ease, filter 0.6s ease;
    }
    .star-node.lit {
      fill: var(--pink-neon);
      opacity: 0.95;
      filter: drop-shadow(0 0 4px var(--pink-neon)) drop-shadow(0 0 9px var(--pink-deep));
    }
    .constellation-line {
      stroke: var(--pink-neon);
      stroke-width: 0.4;
      opacity: 0;
      transition: opacity 0.7s ease;
    }
    .constellation-line.lit { opacity: 0.35; }

    /* â”€â”€ SCRATCH-CARD SPARKLE GLAZE CANVAS â”€â”€ */
    #scratch-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 2;
    }

    /* â”€â”€ CHIFFON CURTAIN OVERLAY â”€â”€ */
    #chiffon-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 3; opacity: 0.5;
      mix-blend-mode: soft-light;
    }

    /* â”€â”€ MAIN INTERFACE ARCHITECTURE (LOCKED) â”€â”€ */
    #page-wrap {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 10;
      padding: 2rem;
    }

    .card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2.5rem; width: 100%; max-width: 450px;
    }

    .left-panel {
      width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem;
    }

    .responsive-puppy {
      width: 100%; max-width: 170px; height: auto;
    }

    .right-panel {
      width: 100%; display: flex; flex-direction: column; align-items: center; gap: 1.6rem;
    }

    /* HEADLINES */
    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--brown);
      text-align: center;
    }
    .subline {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0.5em;
      font-size: 0.8rem;
      text-align: center;
      color: var(--brown-muted);
      margin-top: 0.6rem;
      padding-left: 0.5em;
    }

    /* â”€â”€ 1. REEL-TO-REEL TAPE PLAYER â”€â”€ */
    .tape-deck {
      width: 100%; max-width: 210px;
      background: linear-gradient(145deg, var(--metal-1) 0%, var(--metal-2) 100%);
      border: 2.5px solid var(--brown);
      border-radius: 14px;
      padding: 14px 14px 12px;
      box-shadow: 0 8px 20px rgba(54,34,20,0.15), inset 0 1px 2px rgba(255,255,255,0.7), inset 0 -2px 4px rgba(54,34,20,0.12);
      display: flex; flex-direction: column; gap: 10px;
    }
    .tape-reels-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 6px 0;
    }
    .reel-svg { width: 64px; height: 64px; }
    .reel-rotor {
      transform-origin: 32px 32px;
    }
    .reel-rotor.spinning {
      animation: spin 4s linear infinite;
    }
    .reel-rotor.decelerate {
      animation: spin 4s linear infinite;
      animation-play-state: paused;
      transition: transform 1.4s cubic-bezier(0.15, 0.85, 0.35, 1);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .tape-ribbon-svg {
      position: absolute; top: 50%; left: 0; width: 100%; height: 30px;
      transform: translateY(-2px); pointer-events: none;
    }
    .tape-buttons {
      display: flex; gap: 8px; justify-content: center; margin-top: 2px;
    }
    .tape-btn {
      flex: 1; cursor: pointer; user-select: none;
      font-family: 'DM Sans', sans-serif; font-weight: 700;
      font-size: 0.62rem; letter-spacing: 0.18em;
      color: var(--brown);
      background: linear-gradient(180deg, #FFFDFA 0%, #EADFD3 100%);
      border: 2px solid var(--brown);
      border-radius: 7px;
      padding: 7px 4px;
      box-shadow: 0 3px 0 rgba(54,34,20,0.35), inset 0 1px 1px rgba(255,255,255,0.8);
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .tape-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(54,34,20,0.35), inset 0 1px 2px rgba(54,34,20,0.2);
    }
    .tape-btn.active-led {
      background: linear-gradient(180deg, var(--pink) 0%, var(--pink-deep) 100%);
    }

    /* â”€â”€ 4. RIBBON-WEAVE PASSCODE INPUT â”€â”€ */
    .ribbon-input-wrap {
      width: 100%; max-width: 290px;
      display: flex; flex-direction: column; align-items: center;
    }
    #ribbon-svg {
      width: 100%; height: 72px;
      transition: transform 0.2s ease;
    }
    .ribbon-stage { transition: transform 0.15s ease; }
    .ribbon-stage.wave { animation: ribbonWave 1.0s ease-in-out; }
    @keyframes ribbonWave {
      0%, 100% { transform: skewX(0deg) translateX(0); }
      15% { transform: skewX(-7deg) translateX(-6px); }
      35% { transform: skewX(6deg) translateX(5px); }
      55% { transform: skewX(-5deg) translateX(-4px); }
      75% { transform: skewX(3deg) translateX(2px); }
    }
    .bow-group .bow-part {
      transition: opacity 0.4s ease, transform 0.4s ease;
      transform-origin: center center;
    }
    .bow-group .heart-fill {
      opacity: 0; transform: scale(0.2);
      transform-origin: center center;
      transition: opacity 0.45s ease 0.1s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s;
    }
    .bow-group.untied .bow-part {
      opacity: 0; transform: scale(0.3) rotate(20deg);
    }
    .bow-group.untied .heart-fill {
      opacity: 1; transform: scale(1);
      filter: drop-shadow(0 0 5px var(--pink-deep));
    }

    #error-msg {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 0.95rem; color: var(--brown-muted);
      opacity: 0; transition: opacity 0.3s; height: 1.2em;
      text-align: center; margin-top: 0.3rem;
    }
    #error-msg.visible { opacity: 1; }

    /* â”€â”€ 3. ORIGAMI HEART KEYPAD â”€â”€ */
    .keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem; width: 100%; max-width: 250px;
    }
    .heart-btn {
      position: relative; width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
      background: none; border: none; outline: none;
      transition: transform 0.13s cubic-bezier(0.34,1.56,0.64,1), filter 0.13s ease;
      filter: drop-shadow(0 6px 5px rgba(54,34,20,0.22)) drop-shadow(0 2px 1px rgba(54,34,20,0.18));
    }
    .heart-btn:hover { filter: drop-shadow(0 8px 7px rgba(54,34,20,0.28)) brightness(1.02); }
    .heart-btn.pressed {
      transform: scale(0.88) translateY(3px);
      filter: drop-shadow(0 1px 1px rgba(54,34,20,0.25));
    }
    .heart-svg { width: 100%; height: 100%; }
    .heart-label {
      position: absolute; font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 1.1rem; color: var(--brown);
      pointer-events: none; line-height: 1; margin-top: -2px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    }

    /* CONFETTI CANVAS */
    #confetti-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 50;
    }

    /* KEYFRAME ANIMS */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50% { transform: translateY(-12px) rotate(1deg); }
    }
    .float-anim { animation: float 6s ease-in-out infinite; transform-origin: center bottom; }

    @keyframes exitPage {
      100% { opacity: 0; transform: translateY(-40px) scale(0.98); filter: blur(5px); }
    }
    .exit-anim { animation: exitPage 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    /* â”€â”€ LAPTOP VIEW (SIDE-BY-SIDE LOCKED) â”€â”€ */
    @media (min-width: 769px) {
      .card {
        flex-direction: row; max-width: 1000px; width: 90%;
        gap: 6rem; padding: 2rem; justify-content: center;
      }
      .left-panel { gap: 2rem; }
      .responsive-puppy { max-width: 320px; }
      .tape-deck { max-width: 260px; }
      .right-panel { max-width: 380px; }
      .keypad { max-width: 290px; gap: 0.9rem; }
      .heart-label { font-size: 1.25rem; }
      .reel-svg { width: 78px; height: 78px; }
      .reel-rotor { transform-origin: 39px 39px; }
    }
  </style>
</head>

<script>
(function () {
  'use strict';

  const CORRECT = '1234';
  const KEYS    = ['1','2','3','4','5','6','7','8','9','*','0','#'];
  let entered   = '';
  let locked    = false;

  /* ============================================================
     1. REEL-TO-REEL TAPE PLAYER
     ============================================================ */
  const audio    = document.getElementById('tape-audio');
  const reelL    = document.getElementById('reel-left');
  const reelR    = document.getElementById('reel-right');
  const btnStart = document.getElementById('btn-start');
  const btnStop  = document.getElementById('btn-stop');

  function startTape() {
    reelL.classList.remove('decelerate');
    reelR.classList.remove('decelerate');
    void reelL.offsetWidth;
    reelL.classList.add('spinning');
    reelR.classList.add('spinning');
    btnStart.classList.add('active-led');
    btnStop.classList.remove('active-led');
    const p = audio.play();
    if (p && p.catch) p.catch(function(){ /* autoplay guard */ });
  }

  function stopTape() {
    // Capture current rotation for smooth deceleration
    [reelL, reelR].forEach(function(reel){
      reel.classList.remove('spinning');
      reel.classList.add('decelerate');
      reel.style.transform = 'rotate(0deg)';
    });
    btnStart.classList.remove('active-led');
    btnStop.classList.add('active-led');
    audio.pause();
  }

  btnStart.addEventListener('click', startTape);
  btnStop.addEventListener('click', stopTape);

  /* ============================================================
     5. GLOW CONSTELLATION MONOGRAM "ZM"
     ============================================================ */
  const constSvg = document.getElementById('constellation');
  // Define node coordinates for interlocking Z and M (viewBox 400x400)
  // Quadrant grouping: each node tagged 0-3 for progressive lighting.
  const Z_NODES = [
    [120,120],[150,120],[180,120],[210,120],[240,120], // Z top bar
    [225,150],[205,175],                                 // Z diagonal upper
    [185,200],[165,225],                                 // Z diagonal mid
    [145,250],[125,275],                                 // Z diagonal lower
    [120,280],[150,280],[180,280],[210,280],[240,280]    // Z bottom bar
  ];
  const M_NODES = [
    [175,150],[175,185],[175,220],[175,255],[175,290],   // M left stem
    [200,180],[225,210],                                  // M left-inner V
    [250,180],                                            // M valley top
    [275,210],[300,180],                                  // M right-inner V
    [325,150],[325,185],[325,220],[325,255],[325,290]     // M right stem
  ];

  const allNodes = [];
  function addNodes(list){
    list.forEach(function(pt){
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', pt[0]);
      c.setAttribute('cy', pt[1]);
      c.setAttribute('r', 2.6);
      c.classList.add('star-node');
      constSvg.appendChild(c);
      allNodes.push(c);
    });
  }
  addNodes(Z_NODES);
  addNodes(M_NODES);

  // Split all nodes into 4 quadrant batches for progressive glow
  const batches = [[],[],[],[]];
  allNodes.forEach(function(node, i){
    batches[i % 4].push(node);
  });

  function lightConstellation(level){
    // level = number of digits entered (1..4)
    for (let b = 0; b < level && b < 4; b++){
      batches[b].forEach(function(n){ n.classList.add('lit'); });
    }
    // dim batches beyond current level
    for (let b = level; b < 4; b++){
      batches[b].forEach(function(n){ n.classList.remove('lit'); });
    }
  }
  function fullGlow(){
    allNodes.forEach(function(n){ n.classList.add('lit'); });
  }
  function resetGlow(){
    allNodes.forEach(function(n){ n.classList.remove('lit'); });
  }

  /* ============================================================
     4. RIBBON-WEAVE BOWS -> HEARTS
     ============================================================ */
  const ribbonStage = document.getElementById('ribbon-stage');
  const bowGroups = [0,1,2,3].map(function(i){ return document.getElementById('bow-' + i); });

  const BOW_SVG = `
    <g class="bow-part">
      <path d="M0 0 Q-18 -12 -22 -2 Q-26 8 -8 6 Q-2 5 0 0Z" fill="#FFD1DC" stroke="#362214" stroke-width="1.4"/>
      <path d="M0 0 Q18 -12 22 -2 Q26 8 8 6 Q2 5 0 0Z" fill="#FFD1DC" stroke="#362214" stroke-width="1.4"/>
      <path d="M-4 4 L-10 16 L-4 14 Z" fill="#F4A7B9" stroke="#362214" stroke-width="1"/>
      <path d="M4 4 L10 16 L4 14 Z" fill="#F4A7B9" stroke="#362214" stroke-width="1"/>
      <circle cx="0" cy="1" r="4" fill="#F4A7B9" stroke="#362214" stroke-width="1.4"/>
    </g>
    <path class="heart-fill" d="M0 5 C0 5 -10 -1 -10 -8 C-10 -12 -7 -14 -4 -14 C-2 -14 -0.6 -13 0 -11.5 C0.6 -13 2 -14 4 -14 C7 -14 10 -12 10 -8 C10 -1 0 5 0 5Z"
          fill="#FF8FB0" stroke="#F4A7B9" stroke-width="0.8"/>
  `;
  bowGroups.forEach(function(g){ g.innerHTML = BOW_SVG; });

  function untieBow(index){
    if (bowGroups[index]) bowGroups[index].classList.add('untied');
  }
  function retieAllBows(){
    bowGroups.forEach(function(g){ g.classList.remove('untied'); });
  }
  function waveRibbon(){
    ribbonStage.classList.remove('wave');
    void ribbonStage.offsetWidth;
    ribbonStage.classList.add('wave');
  }

  /* ============================================================
     3. ORIGAMI HEART KEYPAD + CONFETTI
     ============================================================ */
  const keypad = document.getElementById('keypad');

  KEYS.forEach(function(label){
    const btn = document.createElement('button');
    btn.className = 'heart-btn';
    btn.setAttribute('aria-label', 'Key ' + label);
    btn.innerHTML = `
      <svg class="heart-svg" viewBox="0 0 80 76" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="origami-${label}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFE0E8"/>
            <stop offset="55%" stop-color="#FFD1DC"/>
            <stop offset="100%" stop-color="#F4A7B9"/>
          </linearGradient>
        </defs>
        <path d="M40 70 C40 70 6 50 6 26 C6 14.95 14.95 6 26 6 C32.1 6 37.6 8.7 40 13 C42.4 8.7 47.9 6 54 6 C65.05 6 74 14.95 74 26 C74 50 40 70 40 70Z"
              fill="url(#origami-${label})" stroke="#362214" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M40 13 L40 70" stroke="#362214" stroke-width="0.8" opacity="0.18"/>
        <path d="M40 13 L14 24" stroke="#FFFFFF" stroke-width="1" opacity="0.45"/>
        <path d="M40 13 L66 24" stroke="#362214" stroke-width="0.8" opacity="0.16"/>
        <path d="M20 22 Q24 14 32 16" stroke="#FDFBF7" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
      </svg>
      <span class="heart-label">${label}</span>
    `;

    const press = function(){ btn.classList.add('pressed'); };
    const release = function(){ btn.classList.remove('pressed'); };

    const onDown = function(e){
      e.preventDefault();
      press();
      let cx, cy;
      if (e.touches && e.touches[0]) {
        cx = e.touches[0].clientX; cy = e.touches[0].clientY;
      } else {
        cx = e.clientX; cy = e.clientY;
      }
      if (cx === undefined) {
        const r = btn.getBoundingClientRect();
        cx = r.left + r.width/2; cy = r.top + r.height/2;
      }
      burstConfetti(cx, cy);
      handleKey(label);
    };

    if ('ontouchstart' in window) {
      btn.addEventListener('touchstart', onDown, { passive: false });
      btn.addEventListener('touchend', release);
      btn.addEventListener('touchcancel', release);
    } else {
      btn.addEventListener('mousedown', onDown);
      btn.addEventListener('mouseup', release);
      btn.addEventListener('mouseleave', release);
    }
    keypad.appendChild(btn);
  });

  function handleKey(key) {
    if (locked || key === '*' || key === '#') return;
    if (entered.length >= 4) return;

    entered += key;
    untieBow(entered.length - 1);
    lightConstellation(entered.length);

    if (entered.length === 4) {
      locked = true;
      if (entered === CORRECT) {
        fullGlow();
        setTimeout(function(){
          document.getElementById('page-wrap').classList.add('exit-anim');
          setTimeout(function(){ window.location.href = 'next.html'; }, 550);
        }, 350);
      } else {
        setTimeout(function(){
          waveRibbon();
          errorMsg.classList.add('visible');
          setTimeout(function(){
            entered = '';
            locked = false;
            retieAllBows();
            resetGlow();
            errorMsg.classList.remove('visible');
          }, 1100);
        }, 220);
      }
    }
  }
  const errorMsg = document.getElementById('error-msg');

  /* ============================================================
     CONFETTI ENGINE
     ============================================================ */
  const confCanvas = document.getElementById('confetti-canvas');
  const confCtx = confCanvas.getContext('2d');
  let confetti = [];
  const CONF_COLORS = ['#FFD1DC','#F4A7B9','#FF8FB0','#FDFBF7','#E8DDD2'];

  function sizeConf(){ confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight; }
  sizeConf();

  function burstConfetti(x, y){
    const count = 12;
    for (let i = 0; i < count; i++){
      confetti.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: -2 - Math.random() * 3,
        size: 3 + Math.random() * 4,
        color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0],
        alpha: 1,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.3,
        gravity: 0.12 + Math.random() * 0.06
      });
    }
  }

  function updateConfetti(){
    confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
    for (let i = confetti.length - 1; i >= 0; i--){
      const p = confetti[i];
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vrot;
      p.alpha -= 0.012;
      if (p.alpha <= 0){ confetti.splice(i, 1); continue; }
      confCtx.save();
      confCtx.globalAlpha = Math.max(0, p.alpha);
      confCtx.translate(p.x, p.y);
      confCtx.rotate(p.rot);
      confCtx.fillStyle = p.color;
      confCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
      confCtx.restore();
    }
    requestAnimationFrame(updateConfetti);
  }
  updateConfetti();

  /* ============================================================
     2. SCRATCH-CARD SPARKLE GLAZE
     ============================================================ */
  const scratch = document.getElementById('scratch-canvas');
  const sctx = scratch.getContext('2d');
  let glowImage = null;

  function buildGlow(){
    // Offscreen warm pink shimmer layer
    const g = sctx.createRadialGradient(
      scratch.width/2, scratch.height/2, 0,
      scratch.width/2, scratch.height/2, Math.max(scratch.width, scratch.height)/1.4
    );
    g.addColorStop(0, 'rgba(255,143,176,0.55)');
    g.addColorStop(0.5, 'rgba(244,167,185,0.4)');
    g.addColorStop(1, 'rgba(255,209,220,0.25)');
    glowImage = g;
  }

  function sizeScratch(){
    scratch.width = window.innerWidth;
    scratch.height = window.innerHeight;
    buildGlow();
    paintFrost(1);
  }

  // Paint the frosty glaze over everything
  function paintFrost(opacity){
    sctx.globalCompositeOperation = 'source-over';
    sctx.fillStyle = 'rgba(253,251,247,' + (0.82 * opacity) + ')';
    sctx.fillRect(0, 0, scratch.width, scratch.height);
    // subtle pink frost speckle
    sctx.fillStyle = 'rgba(255,209,220,' + (0.10 * opacity) + ')';
    sctx.fillRect(0, 0, scratch.width, scratch.height);
  }

  sizeScratch();

  function scratchAt(x, y){
    // Reveal warm glow beneath by erasing frost
    sctx.globalCompositeOperation = 'destination-out';
    const r = 45;
    const grad = sctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, 'rgba(0,0,0,0.9)');
    grad.addColorStop(0.6, 'rgba(0,0,0,0.4)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    sctx.fillStyle = grad;
    sctx.beginPath();
    sctx.arc(x, y, r, 0, Math.PI * 2);
    sctx.fill();

    // paint shimmering glow into cleared area
    sctx.globalCompositeOperation = 'destination-over';
    sctx.fillStyle = glowImage;
    sctx.beginPath();
    sctx.arc(x, y, r, 0, Math.PI * 2);
    sctx.fill();
    sctx.globalCompositeOperation = 'source-over';
  }

  window.addEventListener('mousemove', function(e){ scratchAt(e.clientX, e.clientY); });
  window.addEventListener('touchmove', function(e){
    for (let i = 0; i < e.touches.length; i++){
      scratchAt(e.touches[i].clientX, e.touches[i].clientY);
    }
  }, { passive: true });

  // AUTO-HEAL: gently repaint frost so scratches fade away
  function healFrost(){
    sctx.globalCompositeOperation = 'source-over';
    sctx.fillStyle = 'rgba(253,251,247,0.012)';
    sctx.fillRect(0, 0, scratch.width, scratch.height);
    sctx.fillStyle = 'rgba(255,209,220,0.004)';
    sctx.fillRect(0, 0, scratch.width, scratch.height);
    requestAnimationFrame(healFrost);
  }
  healFrost();

  /* ============================================================
     6. CHIFFON CURTAIN AMBIENT SWAY
     ============================================================ */
  const chiffon = document.getElementById('chiffon-canvas');
  const cctx = chiffon.getContext('2d');
  let chiffonT = 0;

  function sizeChiffon(){
    chiffon.width = window.innerWidth;
    chiffon.height = window.innerHeight;
  }
  sizeChiffon();

  function drawChiffon(){
    cctx.clearRect(0, 0, chiffon.width, chiffon.height);
    const W = chiffon.width, H = chiffon.height;
    const folds = 14;
    const foldW = W / folds;

    for (let i = 0; i <= folds; i++){
      const baseX = i * foldW;
      // each fold sways with offset phase
      const sway = Math.sin(chiffonT * 0.6 + i * 0.55) * (foldW * 0.32);
      const sway2 = Math.cos(chiffonT * 0.4 + i * 0.4) * (foldW * 0.15);

      const grad = cctx.createLinearGradient(baseX - foldW/2, 0, baseX + foldW/2, 0);
      grad.addColorStop(0, 'rgba(255,253,247,0.0)');
      grad.addColorStop(0.5, 'rgba(255,225,232,0.16)');
      grad.addColorStop(1, 'rgba(255,253,247,0.0)');

      cctx.beginPath();
      cctx.moveTo(baseX + sway, 0);
      cctx.bezierCurveTo(
        baseX + sway + sway2, H * 0.35,
        baseX + sway - sway2, H * 0.65,
        baseX + sway, H
      );
      cctx.lineTo(baseX + foldW + sway, H);
      cctx.bezierCurveTo(
        baseX + foldW + sway - sway2, H * 0.65,
        baseX + foldW + sway + sway2, H * 0.35,
        baseX + foldW + sway, 0
      );
      cctx.closePath();
      cctx.fillStyle = grad;
      cctx.fill();

      // soft shadow line on each fold edge
      cctx.beginPath();
      cctx.moveTo(baseX + sway, 0);
      cctx.bezierCurveTo(
        baseX + sway + sway2, H * 0.35,
        baseX + sway - sway2, H * 0.65,
        baseX + sway, H
      );
      cctx.strokeStyle = 'rgba(156,123,103,0.06)';
      cctx.lineWidth = 1.5;
      cctx.stroke();
    }

    chiffonT += 0.012;
    requestAnimationFrame(drawChiffon);
  }
  drawChiffon();

  /* ============================================================
     GLOBAL RESIZE HANDLER (keeps all canvases locked)
     ============================================================ */
  window.addEventListener('resize', function(){
    sizeConf();
    sizeScratch();
    sizeChiffon();
  });

})();
</script>
</body>
</html>
