<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hear Me Once — Momina</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --beige:      #F5EFE6;
      --beige-deep: #EDE4D8;
      --pink:       #F4B8C8;
      --pink-light: #FAD9E3;
      --pink-deep:  #E89AAF;
      --brown:      #3B1F14;
      --brown-mid:  #6B3A28;
      --brown-light:#9E6B56;
      --cream:      #FDF8F3;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--beige);
      color: var(--brown);
      font-family: 'Cormorant Garant', serif;
      overflow: hidden;
    }

    /* Floating petals */
    .petal-layer {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      width: 10px; height: 14px;
      background: var(--pink);
      border-radius: 50% 50% 50% 0 / 60% 60% 40% 0;
      opacity: 0;
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.45; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Main wrapper */
    .stage {
      position: relative; z-index: 1;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "header header"
        "left   right";
    }

    /* ── Header ── */
    header {
      grid-area: header;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(14px, 2.5vh, 28px) 0 clamp(8px, 1.5vh, 18px);
      position: relative;
    }
    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(9px, 1vw, 13px);
      font-weight: 300;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--brown-light);
    }
    .brand {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(42px, 6vw, 88px);
      color: var(--brown);
      line-height: 1;
      margin-top: -4px;
    }
    .divider-line {
      width: clamp(60px, 8vw, 120px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--pink-deep), transparent);
      margin-top: clamp(6px, 1vh, 12px);
    }

    /* ── Left panel — Teddy ── */
    .panel-left {
      grid-area: left;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2vw, 40px) clamp(20px, 4vw, 80px);
      position: relative;
    }
    .teddy-aura {
      position: absolute;
      width: clamp(200px, 30vw, 440px);
      height: clamp(200px, 30vw, 440px);
      border-radius: 50%;
      background: radial-gradient(circle, var(--pink-light) 0%, transparent 70%);
      animation: pulse 3.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50%       { transform: scale(1.08); opacity: 0.85; }
    }
    .teddy-wrap {
      position: relative;
      width: clamp(180px, 26vw, 400px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px, 2vh, 24px);
    }
    .teddy-img {
      width: 100%;
      filter: drop-shadow(0 16px 40px rgba(59,31,20,0.18));
      animation: teddyFloat 4s ease-in-out infinite;
      transform-origin: center bottom;
    }
    @keyframes teddyFloat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%       { transform: translateY(-12px) rotate(1deg); }
    }
    .teddy-caption {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(22px, 2.8vw, 42px);
      color: var(--brown-mid);
      text-align: center;
      line-height: 1.2;
      animation: fadeSlideUp 1.4s ease both;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Right panel — PIN ── */
    .panel-right {
      grid-area: right;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2vw, 40px) clamp(20px, 4vw, 80px);
    }
    .lock-card {
      background: var(--cream);
      border-radius: clamp(16px, 2vw, 28px);
      padding: clamp(24px, 3.5vh, 48px) clamp(28px, 3.5vw, 52px);
      box-shadow:
        0 4px 24px rgba(59,31,20,0.07),
        0 1px 0 rgba(255,255,255,0.8) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(14px, 2.2vh, 28px);
      animation: cardRise 1s ease both 0.3s;
    }
    @keyframes cardRise {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .lock-label {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(9px, 0.9vw, 12px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--brown-light);
    }
    .lock-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(28px, 3.5vw, 52px);
      color: var(--brown);
      line-height: 1;
      margin-top: -8px;
    }

    /* PIN dots */
    .pin-dots {
      display: flex;
      gap: clamp(10px, 1.4vw, 20px);
    }
    .dot {
      width:  clamp(12px, 1.6vw, 22px);
      height: clamp(12px, 1.6vw, 22px);
      border-radius: 50%;
      border: 2px solid var(--pink-deep);
      background: transparent;
      transition: background 0.25s, border-color 0.25s, transform 0.18s;
    }
    .dot.filled {
      background: var(--pink-deep);
      border-color: var(--pink-deep);
      transform: scale(1.18);
    }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 1.2vw, 16px);
    }
    .key {
      width:  clamp(48px, 6vw, 82px);
      height: clamp(48px, 6vw, 82px);
      border-radius: clamp(10px, 1.2vw, 16px);
      border: 1.5px solid var(--pink);
      background: var(--beige);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, transform 0.13s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .key:hover {
      background: var(--pink-light);
      box-shadow: 0 4px 16px rgba(244,184,200,0.45);
      transform: translateY(-2px);
    }
    .key:active { transform: scale(0.93); }
    .key-num {
      font-family: 'Cormorant Garant', serif;
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 500;
      color: var(--brown);
      line-height: 1;
    }
    .key-letter {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(6px, 0.6vw, 9px);
      letter-spacing: 0.18em;
      color: var(--brown-light);
      margin-top: 2px;
    }
    /* Heart ripple on key press */
    .key::after {
      content: '';
      position: absolute;
      inset: 50%;
      background: var(--pink);
      border-radius: 50%;
      opacity: 0;
      transition: none;
    }
    .key.ripple::after {
      animation: ripple 0.45s ease-out forwards;
    }
    @keyframes ripple {
      0%   { inset: 50%; opacity: 0.5; }
      100% { inset: -20%; opacity: 0; }
    }

    /* Delete key */
    .key-del .key-num {
      font-size: clamp(14px, 1.6vw, 22px);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
    }

    /* Error message */
    .error-msg {
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: clamp(12px, 1.2vw, 16px);
      color: var(--brown-mid);
      min-height: 1.4em;
      text-align: center;
      animation: shake 0.4s ease both;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .error-msg.visible { opacity: 1; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    /* Unlock overlay */
    .unlock-overlay {
      position: fixed; inset: 0;
      background: var(--pink-light);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .unlock-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .unlock-text {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(40px, 7vw, 100px);
      color: var(--brown);
      text-align: center;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.7s ease 0.4s, transform 0.7s ease 0.4s;
    }
    .unlock-overlay.active .unlock-text {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Responsive: portrait/mobile ── */
    @media (max-width: 700px) or (orientation: portrait) {
      html, body { overflow: auto; }
      .stage {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        grid-template-areas:
          "header"
          "left"
          "right";
        height: auto;
        min-height: 100vh;
      }
      .panel-left  { padding: 20px 16px 8px; }
      .panel-right { padding: 8px 16px 32px; }
    }
    @media (max-height: 600px) and (orientation: landscape) {
      .teddy-caption { display: none; }
    }
  </style>
</head>
<body>

<!-- Floating petals -->
<div class="petal-layer" id="petalLayer"></div>

<!-- Unlock transition overlay -->
<div class="unlock-overlay" id="unlockOverlay">
  <div class="unlock-text">Opening something beautiful…</div>
</div>

<div class="stage">

  <!-- Header -->
  <header>
    <span class="eyebrow">Hear Me Once</span>
    <h1 class="brand">Momina</h1>
    <div class="divider-line"></div>
  </header>

  <!-- Left: Teddy -->
  <div class="panel-left">
    <div class="teddy-aura"></div>
    <div class="teddy-wrap">
      <img src="pic1.jpeg" alt="" class="teddy-img" />
      <p class="teddy-caption">I am sorry, Momina</p>
    </div>
  </div>

  <!-- Right: PIN Lock -->
  <div class="panel-right">
    <div class="lock-card">
      <span class="lock-label">Private Access</span>
      <h2 class="lock-title">Enter the code</h2>

      <div class="pin-dots" id="pinDots">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
      </div>

      <div class="keypad" id="keypad">
        <!-- Row 1 -->
        <button class="key" data-n="1"><span class="key-num">1</span></button>
        <button class="key" data-n="2"><span class="key-num">2</span><span class="key-letter">ABC</span></button>
        <button class="key" data-n="3"><span class="key-num">3</span><span class="key-letter">DEF</span></button>
        <!-- Row 2 -->
        <button class="key" data-n="4"><span class="key-num">4</span><span class="key-letter">GHI</span></button>
        <button class="key" data-n="5"><span class="key-num">5</span><span class="key-letter">JKL</span></button>
        <button class="key" data-n="6"><span class="key-num">6</span><span class="key-letter">MNO</span></button>
        <!-- Row 3 -->
        <button class="key" data-n="7"><span class="key-num">7</span><span class="key-letter">PQRS</span></button>
        <button class="key" data-n="8"><span class="key-num">8</span><span class="key-letter">TUV</span></button>
        <button class="key" data-n="9"><span class="key-num">9</span><span class="key-letter">WXYZ</span></button>
        <!-- Row 4 -->
        <button class="key key-del" data-n="del"><span class="key-num">&#8592;</span></button>
        <button class="key" data-n="0"><span class="key-num">0</span></button>
        <button class="key" data-n="del" style="visibility:hidden"></button>
      </div>

      <div class="error-msg" id="errorMsg">That is not our number, love.</div>
    </div>
  </div>

</div>

<script>
  /* ── Petals ── */
  const layer = document.getElementById('petalLayer');
  const PETAL_COUNT = 18;
  for (let i = 0; i < PETAL_COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random() * 10;
    p.style.cssText = `
      width:${size}px; height:${size*1.4}px;
      left:${Math.random()*100}%;
      animation-duration:${7 + Math.random()*8}s;
      animation-delay:${Math.random()*10}s;
      opacity:0;
      transform:rotate(${Math.random()*360}deg);
    `;
    layer.appendChild(p);
  }

  /* ── PIN Logic ── */
  const CORRECT = '1234';
  let entered = '';
  const dots   = [0,1,2,3].map(i => document.getElementById('d'+i));
  const errMsg = document.getElementById('errorMsg');
  const overlay = document.getElementById('unlockOverlay');

  function updateDots() {
    dots.forEach((d, i) => d.classList.toggle('filled', i < entered.length));
  }

  function showError() {
    errMsg.classList.remove('visible');
    void errMsg.offsetWidth; // reflow to re-trigger animation
    errMsg.classList.add('visible');
  }

  function triggerUnlock() {
    overlay.classList.add('active');
    setTimeout(() => {
      window.location.href = 'next.html';
    }, 1800);
  }

  document.getElementById('keypad').addEventListener('click', e => {
    const btn = e.target.closest('[data-n]');
    if (!btn) return;
    const n = btn.dataset.n;

    // ripple
    btn.classList.remove('ripple');
    void btn.offsetWidth;
    btn.classList.add('ripple');
    btn.addEventListener('animationend', () => btn.classList.remove('ripple'), { once: true });

    if (n === 'del') {
      entered = entered.slice(0, -1);
      errMsg.classList.remove('visible');
    } else if (entered.length < 4) {
      entered += n;
    }

    updateDots();

    if (entered.length === 4) {
      if (entered === CORRECT) {
        triggerUnlock();
      } else {
        showError();
        setTimeout(() => {
          entered = '';
          updateDots();
        }, 900);
      }
    }
  });

  /* Keyboard support */
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') {
      document.querySelector(`[data-n="${e.key}"]`)?.click();
    } else if (e.key === 'Backspace') {
      document.querySelector('.key-del')?.click();
    }
  });
</script>
</body>
</html>
