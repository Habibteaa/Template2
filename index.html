<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hear Me Once, Momina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,900;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4E9D9;
    --bg-deep:#ECDBC0;
    --pink:#F1C2CF;
    --pink-soft:#F8DEE5;
    --pink-deep:#E3A2B7;
    --brown:#3B2A1F;
    --brown-soft:#6E4F3C;
    --gold:#C9A063;
    --gold-text:#8C6A34;
    --gold-light:#E7CE9A;
    --cream:#FBF4E8;
    --error:#BD7C7C;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--brown);
    font-family:'Cormorant Garamond',serif;
    height:100vh;
    overflow:hidden;
    position:relative;
  }
  button{font-family:inherit;}

  /* ambient */
  .ambient{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
  .orb{position:absolute;border-radius:50%;filter:blur(2px);opacity:.22;animation:floatY linear infinite alternate;}
  .orb.gold{background:radial-gradient(circle, var(--gold-light), transparent 70%);}
  .orb.pink{background:radial-gradient(circle, var(--pink-deep), transparent 70%);}
  .o1{width:220px;height:220px;left:4%;top:8%;animation-duration:26s;}
  .o2{width:160px;height:160px;left:80%;top:14%;animation-duration:21s;animation-delay:-4s;}
  .o3{width:260px;height:260px;left:65%;top:62%;animation-duration:30s;animation-delay:-9s;}
  .o4{width:140px;height:140px;left:10%;top:70%;animation-duration:19s;animation-delay:-6s;}
  .o5{width:180px;height:180px;left:45%;top:-4%;animation-duration:24s;animation-delay:-12s;}
  @keyframes floatY{0%{transform:translate(0,0);}100%{transform:translate(24px,-28px);}}

  /* layout */
  .stage{
    position:relative;
    z-index:1;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:clamp(12px,2.5vw,28px) clamp(16px,3vw,40px);
    gap:clamp(10px,2vh,22px);
  }

  /* masthead */
  .masthead{text-align:center;}
  .title{
    margin:0;
    font-family:'Playfair Display',serif;
    font-weight:700;
    text-transform:uppercase;
    line-height:1.05;
    color:var(--brown);
    opacity:0;
    animation:fadeRise 1s var(--ease) .25s forwards;
  }
  .title .line1{
    display:block;
    font-size:clamp(18px,3vw,30px);
    letter-spacing:.14em;
  }
  .title .name{
    display:block;
    margin-top:.1em;
    font-style:italic;
    font-weight:900;
    font-size:clamp(32px,6.5vw,64px);
    letter-spacing:.05em;
    color:var(--gold-text);
  }
  .flourish{
    display:block;
    margin:8px auto 0;
    width:clamp(120px,16vw,200px);
    height:auto;
    opacity:0;
    animation:fadeIn .6s ease .9s forwards;
  }
  .flourish path{
    fill:none;
    stroke:var(--gold);
    stroke-width:2;
    stroke-linecap:round;
    stroke-dasharray:260;
    stroke-dashoffset:260;
    animation:drawLine 1.3s var(--ease) 1s forwards;
  }

  /* content row */
  .content{
    display:flex;
    flex-direction:row;
    align-items:center;
    gap:clamp(20px,3.5vw,52px);
    width:100%;
    max-width:1100px;
    justify-content:center;
  }

  /* teddy bear photo — frameless, floating */
  .photo-wrap{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    animation:fadeScaleLeft 1s var(--ease) .7s forwards;
  }
  .photo-wrap img{
    width:clamp(160px,22vw,280px);
    height:auto;
    display:block;
    transform:rotate(-5deg);
    filter:drop-shadow(0 18px 32px rgba(59,42,31,.18));
    transition:transform .4s var(--ease);
  }
  .photo-wrap img:hover{transform:rotate(-3deg) scale(1.03);}

  /* lock card */
  .lock-card{
    flex:0 0 auto;
    background:linear-gradient(160deg,var(--cream),var(--bg-deep));
    border:1px solid var(--gold);
    border-radius:20px;
    padding:clamp(18px,2.8vw,34px) clamp(20px,3vw,38px);
    box-shadow:0 24px 60px -24px rgba(59,42,31,.28);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:clamp(10px,1.8vh,18px);
    width:clamp(280px,36vw,400px);
    opacity:0;
    animation:fadeScaleRight 1s var(--ease) .85s forwards;
  }
  .lock-card.shake{animation:shake .5s ease;}

  /* pin dots */
  .pin-row{display:flex;gap:clamp(12px,2.2vw,20px);}
  .pin-box{
    width:clamp(44px,6.5vw,62px);
    height:clamp(44px,6.5vw,62px);
    border:1.5px solid var(--gold);
    border-radius:10px;
    background:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:border-color .25s, box-shadow .25s;
  }
  .pin-box::after{
    content:"";
    width:42%;
    height:42%;
    border-radius:50%;
    background:var(--gold-text);
    transform:scale(0);
    transition:transform .25s var(--ease);
  }
  .pin-box.filled::after{transform:scale(1);animation:popIn .3s var(--ease);}
  .pin-box.success{border-color:var(--gold);background:var(--gold-light);box-shadow:0 0 0 4px rgba(201,160,99,.25);}
  .pin-box.success::after{background:var(--brown);}

  .pin-feedback{
    min-height:1em;
    margin:0;
    font-style:italic;
    font-size:clamp(12px,1.5vw,14px);
    color:var(--error);
    opacity:0;
    transition:opacity .25s;
  }
  .pin-feedback.show{opacity:1;}

  /* keypad */
  .keypad{
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:clamp(7px,1.4vw,13px);
  }
  .key{
    position:relative;
    aspect-ratio:1;
    border:none;
    background:transparent;
    cursor:pointer;
    display:grid;
    place-items:center;
    padding:0;
    -webkit-tap-highlight-color:transparent;
  }
  .key:focus-visible{outline:2px solid var(--gold-text);outline-offset:4px;border-radius:8px;}
  .heart-svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    fill:var(--pink);
    stroke:var(--gold);
    stroke-width:1;
    filter:drop-shadow(0 5px 8px rgba(59,42,31,.15));
    transition:transform .22s var(--ease), fill .22s;
  }
  .key:hover .heart-svg{transform:scale(1.07);fill:var(--pink-deep);}
  .key:active .heart-svg{transform:scale(.92);}
  .key-label{
    position:relative;
    z-index:1;
    transform:translateY(-12%);
    font-weight:700;
    color:var(--brown);
    font-size:clamp(20px,3.2vw,28px);
    line-height:1;
  }
  .key.key-util .key-label{
    font-size:clamp(16px,2vw,20px);
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  /* backspace icon */
  .key.key-util .key-label svg{
    width:clamp(18px,2.4vw,24px);
    height:clamp(18px,2.4vw,24px);
    fill:none;
    stroke:var(--brown);
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  /* veil */
  .veil{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 50% 50%, var(--cream), var(--bg-deep));
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .9s ease;
    z-index:50;
  }
  .veil.show{opacity:1;pointer-events:all;}
  .veil span{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(28px,5vw,52px);
    color:var(--brown);
    opacity:0;
    transform:translateY(10px);
    transition:opacity .8s ease .25s, transform .8s ease .25s;
  }
  .veil.show span{opacity:1;transform:translateY(0);}

  @keyframes fadeRise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes fadeScaleLeft{from{opacity:0;transform:translateX(-26px) scale(.96);}to{opacity:1;transform:translateX(0) scale(1);}}
  @keyframes fadeScaleRight{from{opacity:0;transform:translateX(26px) scale(.96);}to{opacity:1;transform:translateX(0) scale(1);}}
  @keyframes drawLine{to{stroke-dashoffset:0;}}
  @keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
  @keyframes shake{
    10%,90%{transform:translateX(-2px);}
    20%,80%{transform:translateX(4px);}
    30%,50%,70%{transform:translateX(-7px);}
    40%,60%{transform:translateX(7px);}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
    .orb{display:none;}
  }

  @media (max-width:500px){
    .content{gap:14px;}
    .photo-wrap img{width:clamp(110px,38vw,160px);}
    .lock-card{width:clamp(220px,58vw,320px);padding:14px 12px;}
  }
</style>
</head>
<body>

<div class="ambient" aria-hidden="true">
  <span class="orb gold o1"></span>
  <span class="orb pink o2"></span>
  <span class="orb gold o3"></span>
  <span class="orb pink o4"></span>
  <span class="orb gold o5"></span>
</div>

<main class="stage">
  <header class="masthead">
    <h1 class="title">
      <span class="line1">Hear Me Once</span>
      <span class="name">Momina</span>
    </h1>
    <svg class="flourish" viewBox="0 0 220 30" xmlns="http://www.w3.org/2000/svg">
      <path d="M5,15 C40,0 60,30 110,15 C160,0 180,30 215,15"/>
    </svg>
  </header>

  <section class="content">
    <!-- Teddy bear — frameless so bg blends in -->
    <div class="photo-wrap">
      <img src="pic1.jpg" alt="">
    </div>

    <!-- Lock card -->
    <div class="lock-card" id="lockCard">
      <div class="pin-row" id="pinRow">
        <span class="pin-box"></span>
        <span class="pin-box"></span>
        <span class="pin-box"></span>
        <span class="pin-box"></span>
      </div>

      <p class="pin-feedback" id="pinFeedback" aria-live="polite"></p>

      <div class="keypad" id="keypad"></div>
    </div>
  </section>
</main>

<div class="veil" id="veil"><span id="veilText"></span></div>

<script>
(function(){
  const HEART_PATH = "M16 28C16 28 1 18.5 1 9.5C1 4.8 4.8 1 9.5 1C12.6 1 15.2 2.7 16 5.4C16.8 2.7 19.4 1 22.5 1C27.2 1 31 4.8 31 9.5C31 18.5 16 28 16 28Z";
  const BACKSPACE_SVG = `<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="21 8 21 16"/><path d="M3 12h14l-4-4m0 8l4-4"/></svg>`;

  // Layout: 1 2 3 / 4 5 6 / 7 8 9 / [empty] 0 [backspace]
  const KEYS = ['1','2','3','4','5','6','7','8','9','','0','#'];
  const keypad = document.getElementById('keypad');

  KEYS.forEach((k, idx) => {
    if(k === ''){
      // empty spacer
      const spacer = document.createElement('div');
      keypad.appendChild(spacer);
      return;
    }
    const btn = document.createElement('button');
    btn.type = 'button';
    const isBack = k === '#';
    btn.className = 'key' + (isBack ? ' key-util' : '');
    btn.dataset.key = k;
    btn.setAttribute('aria-label', isBack ? 'Backspace' : k);
    btn.style.animation = `fadeRise .6s cubic-bezier(.16,1,.3,1) ${1 + idx*0.04}s forwards`;
    btn.style.opacity = '0';
    const label = isBack ? BACKSPACE_SVG : k;
    btn.innerHTML = `
      <svg class="heart-svg" viewBox="0 0 32 29" aria-hidden="true"><path d="${HEART_PATH}"/></svg>
      <span class="key-label">${label}</span>
    `;
    keypad.appendChild(btn);
  });

  const CORRECT = '1234';
  let pin = '';
  const boxes = Array.from(document.querySelectorAll('.pin-box'));
  const feedback = document.getElementById('pinFeedback');
  const lockCard = document.getElementById('lockCard');
  const veil = document.getElementById('veil');
  const veilText = document.getElementById('veilText');
  let locked = false;

  function renderBoxes(){
    boxes.forEach((b,i) => b.classList.toggle('filled', i < pin.length));
  }
  function clearFeedback(){ feedback.classList.remove('show'); }

  function press(k){
    if(locked) return;
    if(k === '#'){ pin = pin.slice(0,-1); renderBoxes(); clearFeedback(); return; }
    if(pin.length >= 4) return;
    pin += k;
    renderBoxes();
    if(pin.length === 4) setTimeout(checkPin, 220);
  }

  function checkPin(){
    if(pin === CORRECT) success();
    else fail();
  }

  function fail(){
    locked = true;
    lockCard.classList.add('shake');
    feedback.textContent = 'Not quite — try again.';
    feedback.classList.add('show');
    setTimeout(()=>{
      pin = '';
      renderBoxes();
      lockCard.classList.remove('shake');
      clearFeedback();
      locked = false;
    }, 850);
  }

  function success(){
    locked = true;
    clearFeedback();
    boxes.forEach((b,i) => setTimeout(() => b.classList.add('success'), i*110));
    setTimeout(()=>{
      veilText.textContent = "It's you.";
      veil.classList.add('show');
      setTimeout(() => { window.location.href = 'next.html'; }, 1500);
    }, 650);
  }

  keypad.addEventListener('click', (e) => {
    const btn = e.target.closest('.key');
    if(btn) press(btn.dataset.key);
  });

  window.addEventListener('keydown', (e) => {
    if(/^[0-9]$/.test(e.key)) press(e.key);
    else if(e.key === 'Backspace') press('#');
  });
})();
</script>
</body>
</html>
