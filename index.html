<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hear Me Once</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #FDFBF7;
      --pink: #FFD1DC;
      --pink-deep: #F4A7B9;
      --brown: #362214;
      --brown-light: #6B4C35;
      --brown-muted: #9C7B67;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--brown);
      overflow: hidden;
    }

    /* ── floating / breathing animation for the puppy ── */
    @keyframes float {
      0%   { transform: translateY(0px) rotate(-1deg); }
      50%  { transform: translateY(-14px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(-1deg); }
    }
    .float-anim {
      animation: float 5s ease-in-out infinite;
      transform-origin: center bottom;
    }

    /* ── shake for wrong PIN ── */
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-8px); }
      30%  { transform: translateX(8px); }
      45%  { transform: translateX(-6px); }
      60%  { transform: translateX(6px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    .shake { animation: shake 0.55s cubic-bezier(.36,.07,.19,.97) both; }

    /* ── heart button press squish ── */
    @keyframes squish {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.82); }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .squish { animation: squish 0.28s ease-out forwards; }

    /* ── page-exit slide-up + fade ── */
    @keyframes exitPage {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }
    .exit-anim {
      animation: exitPage 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ── PIN slot filled pulse ── */
    @keyframes slotFill {
      0%   { transform: scale(1); background-color: var(--cream); }
      50%  { transform: scale(1.18); background-color: var(--pink); }
      100% { transform: scale(1); background-color: var(--pink); }
    }
    .slot-filled { animation: slotFill 0.22s ease-out forwards; }

    /* page wrapper */
    #page-wrap {
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* main card */
    .card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      padding: 3.5rem 4rem;
      max-width: 960px;
      width: 100%;
    }

    /* left panel */
    .left-panel {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* right panel */
    .right-panel {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* header text */
    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--brown);
      text-align: center;
    }
    .subline {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--brown);
      text-align: center;
      margin-top: 0.5rem;
    }
    /* PIN slots */
    .pin-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
    }
    .pin-slot {
      width: 52px; height: 52px;
      border-radius: 12px;
      border: 2px solid var(--brown);
      background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
      position: relative;
    }
    .pin-slot .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--brown);
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.15s, transform 0.15s;
    }
    .pin-slot.filled .dot { opacity: 1; transform: scale(1); }

    /* error message */
    #error-msg {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      color: var(--brown-muted);
      opacity: 0;
      transition: opacity 0.3s;
      height: 1.2em;
      text-align: center;
    }
    #error-msg.visible { opacity: 1; }

    /* keypad grid */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
      width: 100%;
      max-width: 240px;
    }

    /* heart button */
    .heart-btn {
      position: relative;
      width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: none; border: none; outline: none;
    }
    .heart-btn:focus-visible .heart-svg { outline: 2px solid var(--brown); border-radius: 4px; }

    .heart-svg {
      width: 100%; height: 100%;
      transition: filter 0.15s;
    }
    .heart-btn:hover .heart-svg { filter: brightness(0.95); }

    .heart-label {
      position: absolute;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      color: var(--brown);
      pointer-events: none;
      line-height: 1;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      html, body { overflow: hidden; }
      #page-wrap { align-items: center; }

      .card {
        flex-direction: column;
        gap: 1.6rem;
        padding: 2rem 1.5rem 1.8rem;
        height: 100vh;
        justify-content: center;
        overflow: hidden;
      }

      .left-panel svg { width: 140px !important; height: 140px !important; }

      .pin-slot { width: 44px; height: 44px; }
      .keypad { max-width: 210px; gap: 0.5rem; }
      .headline { font-size: 1.8rem; }
      .subline { font-size: 1rem; }
    }

    /* divider line */
    .divider {
      width: 40px; height: 1.5px;
      background: var(--brown-muted);
      margin: 0 auto;
      opacity: 0.45;
    }
  </style>
</head>
<body>

<div id="page-wrap">
  <div class="card" id="main-card">

    <!-- ═══════════════ LEFT: SVG PUPPY ═══════════════ -->
    <div class="left-panel">
      <div class="float-anim">
        <svg width="260" height="280" viewBox="0 0 260 280" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Cute puppy holding a flower">

          <!-- shadow / ground -->
          <ellipse cx="130" cy="272" rx="58" ry="7" fill="#D4BCA8" opacity="0.35"/>

          <!-- TAIL -->
          <path d="M168 200 Q210 185 205 155 Q200 132 182 140" stroke="#4A3525" stroke-width="6" stroke-linecap="round" fill="none"/>

          <!-- BODY -->
          <ellipse cx="130" cy="200" rx="62" ry="58" fill="#FDFBF7"/>
          <ellipse cx="130" cy="200" rx="62" ry="58" stroke="#362214" stroke-width="3"/>

          <!-- TUMMY PATCH (pink) -->
          <ellipse cx="130" cy="210" rx="32" ry="28" fill="#FFD1DC" opacity="0.55"/>

          <!-- BACK LEFT LEG -->
          <rect x="80" y="238" width="26" height="30" rx="13" fill="#FDFBF7" stroke="#362214" stroke-width="2.5"/>
          <!-- BACK RIGHT LEG -->
          <rect x="154" y="238" width="26" height="30" rx="13" fill="#FDFBF7" stroke="#362214" stroke-width="2.5"/>

          <!-- LEFT ARM (holding flower) -->
          <path d="M78 190 Q52 185 44 165" stroke="#362214" stroke-width="5.5" stroke-linecap="round" fill="none"/>
          <!-- left paw -->
          <ellipse cx="44" cy="162" rx="10" ry="9" fill="#FFD1DC" stroke="#362214" stroke-width="2.5"/>

          <!-- RIGHT ARM -->
          <path d="M182 190 Q206 183 212 198" stroke="#362214" stroke-width="5.5" stroke-linecap="round" fill="none"/>
          <!-- right paw -->
          <ellipse cx="214" cy="202" rx="10" ry="9" fill="#FFD1DC" stroke="#362214" stroke-width="2.5"/>

          <!-- NECK -->
          <rect x="111" y="142" width="38" height="22" rx="10" fill="#FDFBF7" stroke="#362214" stroke-width="2.5"/>

          <!-- HEAD -->
          <ellipse cx="130" cy="115" rx="58" ry="52" fill="#FDFBF7"/>
          <ellipse cx="130" cy="115" rx="58" ry="52" stroke="#362214" stroke-width="3"/>

          <!-- LEFT EAR (floppy, pink inside) -->
          <path d="M80 90 Q60 55 72 35 Q84 18 98 48 Q106 68 95 88Z" fill="#FDFBF7" stroke="#362214" stroke-width="2.8"/>
          <path d="M82 85 Q65 55 76 40 Q86 25 96 52 Q102 68 93 83Z" fill="#FFD1DC" opacity="0.7"/>

          <!-- RIGHT EAR (floppy, pink inside) -->
          <path d="M180 90 Q200 55 188 35 Q176 18 162 48 Q154 68 165 88Z" fill="#FDFBF7" stroke="#362214" stroke-width="2.8"/>
          <path d="M178 85 Q195 55 184 40 Q174 25 164 52 Q158 68 167 83Z" fill="#FFD1DC" opacity="0.7"/>

          <!-- SNOUT (muzzle) -->
          <ellipse cx="130" cy="128" rx="28" ry="20" fill="#FFD1DC" opacity="0.5"/>
          <ellipse cx="130" cy="128" rx="28" ry="20" stroke="#362214" stroke-width="2"/>

          <!-- NOSE -->
          <ellipse cx="130" cy="122" rx="9" ry="6" fill="#362214"/>
          <!-- nose highlight -->
          <ellipse cx="127" cy="120" rx="3" ry="2" fill="#FDFBF7" opacity="0.6"/>

          <!-- MOUTH -->
          <path d="M121 132 Q130 141 139 132" stroke="#362214" stroke-width="2.2" stroke-linecap="round" fill="none"/>

          <!-- LEFT EYE -->
          <ellipse cx="111" cy="105" rx="11" ry="12" fill="#362214"/>
          <ellipse cx="108" cy="102" rx="3.5" ry="3.5" fill="white" opacity="0.7"/>
          <!-- left eye sparkle -->
          <circle cx="114" cy="100" r="1.5" fill="white" opacity="0.9"/>

          <!-- RIGHT EYE -->
          <ellipse cx="149" cy="105" rx="11" ry="12" fill="#362214"/>
          <ellipse cx="146" cy="102" rx="3.5" ry="3.5" fill="white" opacity="0.7"/>
          <!-- right eye sparkle -->
          <circle cx="152" cy="100" r="1.5" fill="white" opacity="0.9"/>

          <!-- BROWS -->
          <path d="M100 94 Q111 88 120 91" stroke="#362214" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M140 91 Q149 88 160 94" stroke="#362214" stroke-width="2.2" stroke-linecap="round" fill="none"/>

          <!-- CHEEK BLUSHES -->
          <ellipse cx="97" cy="122" rx="11" ry="7" fill="#FFD1DC" opacity="0.45"/>
          <ellipse cx="163" cy="122" rx="11" ry="7" fill="#FFD1DC" opacity="0.45"/>

          <!-- COLLAR (pink with bow) -->
          <rect x="108" y="155" width="44" height="11" rx="5.5" fill="#FFD1DC" stroke="#362214" stroke-width="2"/>
          <!-- collar tag -->
          <circle cx="130" cy="160.5" r="5" fill="#FDFBF7" stroke="#362214" stroke-width="1.5"/>
          <!-- collar heart on tag -->
          <path d="M128 159 Q128 157.5 130 159 Q132 157.5 132 159 Q132 161 130 162.5 Q128 161 128 159Z" fill="#FFD1DC"/>

          <!-- ── FLOWER (held by left paw) ── -->
          <!-- stem -->
          <line x1="44" y1="153" x2="44" y2="110" stroke="#5C7A3E" stroke-width="3" stroke-linecap="round"/>
          <!-- leaf -->
          <path d="M44 130 Q32 118 38 108 Q48 116 44 130Z" fill="#7BAD5C"/>
          <!-- petals -->
          <ellipse cx="44" cy="95" rx="8" ry="14" fill="#FFD1DC" stroke="#362214" stroke-width="1.5"/>
          <ellipse cx="44" cy="95" rx="8" ry="14" fill="#FFD1DC" stroke="#362214" stroke-width="1.5" transform="rotate(45 44 95)"/>
          <ellipse cx="44" cy="95" rx="8" ry="14" fill="#FFD1DC" stroke="#362214" stroke-width="1.5" transform="rotate(90 44 95)"/>
          <ellipse cx="44" cy="95" rx="8" ry="14" fill="#FFD1DC" stroke="#362214" stroke-width="1.5" transform="rotate(135 44 95)"/>
          <!-- flower center -->
          <circle cx="44" cy="95" r="9" fill="#FDFBF7" stroke="#362214" stroke-width="2"/>
          <circle cx="44" cy="95" r="5" fill="#FFD1DC"/>

          <!-- tiny stars / sparkles around -->
          <g opacity="0.5">
            <path d="M222 80 L223.5 83 L227 83 L224.3 85.3 L225.4 89 L222 87 L218.6 89 L219.7 85.3 L217 83 L220.5 83Z" fill="#FFD1DC"/>
            <path d="M16 130 L17 132.5 L19.5 132.5 L17.5 134.2 L18.3 137 L16 135.5 L13.7 137 L14.5 134.2 L12.5 132.5 L15 132.5Z" fill="#FFD1DC"/>
            <path d="M220 205 L221 207 L223 207 L221.4 208.4 L222 210.5 L220 209.3 L218 210.5 L218.6 208.4 L217 207 L219 207Z" fill="#F4A7B9"/>
          </g>
        </svg>
      </div>
    </div>

    <!-- ═══════════════ RIGHT: PASSCODE UI ═══════════════ -->
    <div class="right-panel">

      <!-- header -->
      <div style="text-align:center;">
        <div class="headline">Hear Me Once</div>
        <div class="subline">M O M I N A</div>
      </div>

      <!-- PIN display -->
      <div>
        <div class="pin-row" id="pin-row">
          <div class="pin-slot" id="slot-0"><div class="dot"></div></div>
          <div class="pin-slot" id="slot-1"><div class="dot"></div></div>
          <div class="pin-slot" id="slot-2"><div class="dot"></div></div>
          <div class="pin-slot" id="slot-3"><div class="dot"></div></div>
        </div>
        <div id="error-msg">Incorrect Key. Try again.</div>
      </div>

      <!-- keypad -->
      <div class="keypad" id="keypad">
        <!-- rows: 1 2 3 / 4 5 6 / 7 8 9 / * 0 # -->
      </div>

    </div><!-- end right-panel -->
  </div><!-- end card -->
</div><!-- end page-wrap -->


<script>
(function () {

  /* ── config ── */
  const CORRECT = '1234';
  const KEYS    = ['1','2','3','4','5','6','7','8','9','*','0','#'];

  /* ── state ── */
  let entered  = '';
  let locked   = false;

  /* ── elements ── */
  const slots    = [0,1,2,3].map(i => document.getElementById('slot-' + i));
  const errorMsg = document.getElementById('error-msg');
  const pinRow   = document.getElementById('pin-row');
  const keypad   = document.getElementById('keypad');

  /* ── build keypad ── */
  KEYS.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'heart-btn';
    btn.setAttribute('aria-label', 'Key ' + label);
    btn.dataset.key = label;

    /* heart SVG */
    btn.innerHTML = `
      <svg class="heart-svg" viewBox="0 0 80 76" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 70 C40 70 6 50 6 26 C6 14.95 14.95 6 26 6 C32.1 6 37.6 8.7 40 13 C42.4 8.7 47.9 6 54 6 C65.05 6 74 14.95 74 26 C74 50 40 70 40 70Z"
              fill="#FFD1DC" stroke="#362214" stroke-width="3" stroke-linejoin="round"/>
        <!-- subtle inner highlight -->
        <path d="M20 22 Q24 14 32 16" stroke="#FDFBF7" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
      </svg>
      <span class="heart-label">${label}</span>
    `;

    btn.addEventListener('click', () => handleKey(label, btn));
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleKey(label, btn); }, { passive: false });

    keypad.appendChild(btn);
  });

  /* ── slot updater ── */
  function refreshSlots() {
    slots.forEach((slot, i) => {
      slot.classList.remove('slot-filled');
      void slot.offsetWidth; // reflow
      if (i < entered.length) {
        slot.classList.add('filled');
        slot.classList.add('slot-filled');
      } else {
        slot.classList.remove('filled');
      }
    });
  }

  /* ── key handler ── */
  function handleKey(key, btn) {
    if (locked) return;
    if (key === '*' || key === '#') return; /* ignore specials */
    if (entered.length >= 4) return;

    /* squish animation */
    btn.classList.remove('squish');
    void btn.offsetWidth;
    btn.classList.add('squish');
    btn.addEventListener('animationend', () => btn.classList.remove('squish'), { once: true });

    entered += key;
    refreshSlots();

    if (entered.length === 4) {
      locked = true;
      if (entered === CORRECT) {
        handleSuccess();
      } else {
        handleError();
      }
    }
  }

  /* ── success ── */
  function handleSuccess() {
    setTimeout(() => {
      const wrap = document.getElementById('page-wrap');
      wrap.classList.add('exit-anim');
      wrap.addEventListener('animationend', () => {
        window.location.href = 'next.html';
      }, { once: true });
    }, 280);
  }

  /* ── error ── */
  function handleError() {
    /* shake the pin row */
    pinRow.classList.remove('shake');
    void pinRow.offsetWidth;
    pinRow.classList.add('shake');

    /* show error message */
    errorMsg.classList.add('visible');

    /* reset after 1s */
    setTimeout(() => {
      entered = '';
      locked  = false;
      refreshSlots();
      errorMsg.classList.remove('visible');
      pinRow.classList.remove('shake');
    }, 1100);
  }

})();
</script>
</body>
</html>
