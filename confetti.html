<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday! 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=DM+Sans:ital,opsz,wght=0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: radial-gradient(ellipse at 50% 38%, #FDFBF7 0%, #EDE0D4 55%, #E8DDD2 100%);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 100vh;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Canvas Engine ── */
canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 5;
}

/* ── Auto Play Sequence Overlays ── */
.dim-overlay {
  position: fixed;
  inset: 0;
  background-color: #160D10;
  z-index: 100;
  opacity: 1;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
.dim-overlay.fade-out {
  opacity: 0;
}

.burst-light {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 10px;
  height: 10px;
  background: radial-gradient(circle, #FFFFFF 0%, rgba(255,182,193,0.8) 40%, rgba(255,105,180,0) 70%);
  border-radius: 50%;
  z-index: 101;
  opacity: 0;
  pointer-events: none;
}
.burst-light.flash {
  animation: lightFlash 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes lightFlash {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(180); opacity: 0; }
}

/* ── Main Layout Container ── */
.finale-container {
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 8vh 20px 6vh;
  text-align: center;
}

/* ── Typography Styling ── */
.birthday-title {
  font-family: 'Berkshire Swash', cursive;
  font-size: clamp(2.2rem, 7vw, 4rem);
  line-height: 1.3;
  display: inline-block;
  max-width: 90%;
  position: relative;
  
  background: linear-gradient(90deg, #E87E91 0%, #D86D80 25%, #C25C6F 50%, #A24A5D 75%, #8B6969 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  
  filter: drop-shadow(0 0 1px #FFF) drop-shadow(0 0 2px #FFF);
  will-change: transform, opacity;
  opacity: 0;
  transform: translateY(-120px);
}

.birthday-title.animate {
  animation: bounceInDrop 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  opacity: 1;
}

@keyframes bounceInDrop {
  0% { opacity: 0; transform: translateY(-120px); }
  60% { opacity: 1; transform: translateY(16px); }
  80% { transform: translateY(-6px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ── Mascot & Signature Group ── */
.mascot-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: auto;
  margin-bottom: 4vh;
  opacity: 1;
  transform: translateY(200px);
  transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  will-change: transform;
}
.mascot-group.slide-up {
  transform: translateY(0);
}

.bunny-mascot {
  width: 130px;
  height: 130px;
}
.mascot-group.slide-up .bunny-mascot {
  animation: happyDance 0.6s ease-in-out infinite alternate;
}

@keyframes happyDance {
  0% { transform: translateY(0) rotate(-3deg) scaleY(1); }
  100% { transform: translateY(-8px) rotate(3deg) scaleY(0.95); }
}

.signature-text {
  font-family: 'Berkshire Swash', cursive;
  font-style: italic;
  font-size: clamp(1.1rem, 4vw, 1.6rem);
  color: #8B6969;
  margin-top: 12px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 1s ease, transform 1s ease;
}
.signature-text.fade-in {
  opacity: 1;
  transform: translateY(0);
}

/* ── Replay Action ── */
#replayBtn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: white;
  color: #FF69B4;
  box-shadow: 0 4px 15px rgba(139, 105, 105, 0.15), inset 0 0 0 1px rgba(255, 105, 180, 0.1);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  opacity: 0;
  visibility: hidden;
  transform: scale(0.8);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.6s;
  z-index: 50;
}
#replayBtn.show {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}
#replayBtn:hover {
  transform: scale(1.08) rotate(-45deg);
  background-color: #FFF4F7;
}
#replayBtn:active {
  transform: scale(0.95);
}
</style>
</head>
<body>

<div class="dim-overlay" id="dimOverlay"></div>
<div class="burst-light" id="burstLight"></div>

<canvas id="finaleCanvas"></canvas>

<div class="finale-container">
  <div class="header-group">
      <h1 class="birthday-title" id="title">Happy Birthday Scarlet</h1>
  </div>

  <div class="mascot-group" id="mascotGroup">
    <svg class="bunny-mascot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bunnyGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFF0F5" stop-opacity="1"/>
          <stop offset="100%" stop-color="#E6C5D3" stop-opacity="0.3"/>
        </radialGradient>
      </defs>
      <ellipse cx="38" cy="25" rx="7" ry="22" fill="#FFF0F5" transform="rotate(-10 38 25)"/>
      <ellipse cx="38" cy="25" rx="4" ry="16" fill="#FFB6C1" transform="rotate(-10 38 25)"/>
      <ellipse cx="62" cy="25" rx="7" ry="22" fill="#FFF0F5" transform="rotate(10 62 25)"/>
      <ellipse cx="62" cy="25" rx="4" ry="16" fill="#FFB6C1" transform="rotate(10 62 25)"/>
      <ellipse cx="50" cy="72" rx="24" ry="18" fill="#FFF0F5"/>
      <circle cx="36" cy="85" r="7" fill="#E6C5D3"/>
      <circle cx="64" cy="85" r="7" fill="#E6C5D3"/>
      <circle cx="50" cy="50" r="20" fill="#FFF0F5"/>
      <circle cx="36" cy="54" r="4" fill="#FFB6C1" opacity="0.6"/>
      <circle cx="64" cy="54" r="4" fill="#FFB6C1" opacity="0.6"/>
      <circle cx="42" cy="46" r="2.5" fill="#4A373A"/>
      <circle cx="58" cy="46" r="2.5" fill="#4A373A"/>
      <circle cx="43" cy="45" r="0.8" fill="#fff"/>
      <circle cx="59" cy="45" r="0.8" fill="#fff"/>
      <path d="M48 50 Q50 52 52 50" stroke="#4A373A" stroke-width="1.5" fill="none"/>
      <polygon points="49,48 51,48 50,50" fill="#FF69B4"/>
    </svg>
    <p class="signature-text" id="signature">With all my love, Peter</p>
  </div>

  <button id="replayBtn" title="Replay ↺">↺</button>
</div>

<script>
(function() {
  'use strict';

  const dimOverlay = document.getElementById('dimOverlay');
  const burstLight = document.getElementById('burstLight');
  const title = document.getElementById('title');
  const mascotGroup = document.getElementById('mascotGroup');
  const signature = document.getElementById('signature');
  const replayBtn = document.getElementById('replayBtn');
  const canvas = document.getElementById('finaleCanvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let confettiArray = [];
  let balloonArray = [];
  let sparkleArray = [];

  const CONFETTI_COLORS = [
    '#E87E91', 
    '#D86D80', 
    '#8B6969', 
    '#FFD700', 
    '#C0C0C0'  
  ];
  
  const BALLOON_COLORS = ['#FFB6C1', '#FFFFFF', '#8B6969'];
  
  let systemsActive = {
    confetti: false,
    balloons: false,
    sparkles: false
  };

  // Flag to check if balloons are completely finished spawning
  let loopConfetti = true; 

  function initConfetti() {
    systemsActive.confetti = true;
    const count = 180;
    for (let i = 0; i < count; i++) {
      confettiArray.push({
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height - 20,
        width: Math.random() * 4 + 3,
        height: Math.random() * 20 + 15,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        shape: ['triangle', 'ribbon', 'dot'][Math.floor(Math.random() * 3)],
        speedY: Math.random() * 3 + 2.5,
        speedX: (Math.random() - 0.5) * 1.5,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 0.08,
        wobble: Math.random() * 10,
        wobbleSpeed: Math.random() * 0.1 + 0.05
      });
    }
  }

  function spawnBalloons() {
    systemsActive.balloons = true;
    const count = Math.floor(Math.random() * 3) + 8; 
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        balloonArray.push({
          x: Math.random() * (canvas.width * 0.8) + (canvas.width * 0.1),
          y: canvas.height + 120,
          radius: Math.random() * 10 + 24,
          color: BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)],
          speedY: Math.random() * 0.8 + 1.2,
          swaySpeed: Math.random() * 0.02 + 0.01,
          swayAmp: Math.random() * 15 + 10,
          swayOffset: Math.random() * 100
        });

        // Once the final balloon object spawns, safely notify the engine to step down confetti loops
        if (i === count - 1) {
          loopConfetti = false;
        }
      }, i * 450); 
    }
  }

  function addSparkle() {
    if (!systemsActive.sparkles) return;
    if (sparkleArray.length < 40 && Math.random() < 0.4) {
      sparkleArray.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        maxSize: Math.random() * 4 + 4,
        grow: true,
        alpha: 0,
        speedAlpha: Math.random() * 0.03 + 0.01
      });
    }
  }

  function drawBalloonShape(b, currentX) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(currentX, b.y + b.radius);
    ctx.quadraticCurveTo(currentX - 5, b.y + b.radius + 30, currentX + 2, b.y + b.radius + 65);
    ctx.strokeStyle = 'rgba(139, 105, 105, 0.4)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(currentX, b.y, b.radius, b.radius * 1.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(currentX, b.y + b.radius * 1.2);
    ctx.lineTo(currentX - 5, b.y + b.radius * 1.28);
    ctx.lineTo(currentX + 5, b.y + b.radius * 1.28);
    ctx.closePath();
    ctx.fillStyle = b.color;
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(currentX - b.radius * 0.35, b.y - b.radius * 0.4, b.radius * 0.2, b.radius * 0.3, Math.PI / 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.fill();
    ctx.restore();
  }

  function drawSparkleShape(s) {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#FFF8DC';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#FF69B4';

    ctx.beginPath();
    ctx.moveTo(s.x, s.y - s.size);
    ctx.quadraticCurveTo(s.x, s.y, s.x + s.size, s.y);
    ctx.quadraticCurveTo(s.x, s.y, s.x, s.y + s.size);
    ctx.quadraticCurveTo(s.x, s.y, s.x - s.size, s.y);
    ctx.quadraticCurveTo(s.x, s.y, s.x, s.y - s.size);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function engineLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (systemsActive.confetti) {
      confettiArray.forEach((p) => {
        p.y += p.speedY;
        p.x += p.speedX;
        p.wobble += p.wobbleSpeed;
        p.rotation += p.rotationSpeed;

        // Modified: only loop confetti back up if loopConfetti is still true
        if (p.y > canvas.height + 20) {
          if (loopConfetti) {
            p.y = -20;
            p.x = Math.random() * canvas.width;
          } else {
            // Give off-screen elements a dead coordinate so they stop rendering completely
            p.y = canvas.height + 999; 
          }
        }

        // Only draw visible particles
        if (p.y <= canvas.height + 20) {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          
          const wobbleX = Math.sin(p.wobble) * p.width;
          ctx.fillStyle = p.color;
          
          if (p.shape === 'dot') {
              ctx.beginPath();
              ctx.ellipse(0, 0, p.width * 0.7, p.width * 1.2, 0, 0, Math.PI * 2);
              ctx.fill();
          } else if (p.shape === 'triangle') {
              ctx.beginPath();
              ctx.moveTo(-wobbleX, -p.height/2);
              ctx.lineTo(wobbleX, -p.height/2);
              ctx.lineTo(0, p.height/2);
              ctx.closePath();
              ctx.fill();
          } else if (p.shape === 'ribbon') {
              ctx.beginPath();
              ctx.moveTo(-wobbleX, -p.height/2);
              ctx.quadraticCurveTo(wobbleX, 0, -wobbleX, p.height/2);
              ctx.quadraticCurveTo(-wobbleX*2, 0, -wobbleX, -p.height/2);
              ctx.fill();
          }
          ctx.restore();
        }
      });
    }

    if (systemsActive.balloons) {
      balloonArray.forEach((b) => {
        b.y -= b.speedY;
        b.swayOffset += b.swaySpeed;
        let currentX = b.x + Math.sin(b.swayOffset) * b.swayAmp;
        drawBalloonShape(b, currentX);
      });
      balloonArray = balloonArray.filter(b => b.y > -150);
    }

    if (systemsActive.sparkles) {
      addSparkle();
      sparkleArray.forEach((s) => {
        if (s.grow) {
          s.size += 0.2;
          s.alpha += s.speedAlpha;
          if (s.size >= s.maxSize) s.grow = false;
        } else {
          s.size -= 0.15;
          s.alpha -= s.speedAlpha;
        }
        drawSparkleShape(s);
      });
      sparkleArray = sparkleArray.filter(s => s.size > 0.5 && s.alpha > 0);
    }

    requestAnimationFrame(engineLoop);
  }

  engineLoop();

  setTimeout(() => {
    burstLight.classList.add('flash');
    dimOverlay.classList.add('fade-out');
  }, 500);

  setTimeout(() => {
    title.classList.add('animate');
  }, 1000);

  setTimeout(() => {
    initConfetti();
  }, 1200);

  setTimeout(() => {
    spawnBalloons();
  }, 1500);

  setTimeout(() => {
    mascotGroup.classList.add('slide-up');
  }, 2000);

  setTimeout(() => {
    signature.classList.add('fade-in');
  }, 2500);

  setTimeout(() => {
    systemsActive.sparkles = true;
  }, 3000);

  setTimeout(() => {
    replayBtn.classList.add('show');
  }, 5000);

  replayBtn.addEventListener('click', () => {
    window.location.reload(); 
  });

})();
</script>
</body>
</html>
