<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Journey — The Piano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream-base:    #FDFBF7;
    --cream-deep:    #F5EFEB;
    --taupe:         #E8DDD2;
    --pink-soft:     #FFD1DC;
    --pink-deep:     #F4A7B9;
    --pink-neon:     #FF8FB0;
    --brown-primary: #362214;
    --brown-muted:   #9C7B67;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: radial-gradient(120% 90% at 50% -10%, var(--cream-base) 0%, var(--cream-deep) 55%, var(--taupe) 100%);
    color: var(--brown-primary);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .light-rays {
    position: fixed;
    top: -60vh; left: -40vw;
    width: 200vw; height: 260vh;
    pointer-events: none; z-index: 3;
    transform-origin: 30% 25%;
    background: conic-gradient(
      from 0deg at 30% 25%,
      transparent 0deg, rgba(255,235,185,0.000) 4deg,
      rgba(255,235,185,0.055) 7deg, rgba(255,245,200,0.070) 9deg,
      rgba(255,235,185,0.055) 11deg, rgba(255,235,185,0.000) 15deg,
      transparent 26deg, rgba(255,228,170,0.000) 30deg,
      rgba(255,228,170,0.040) 33deg, rgba(255,235,185,0.050) 35deg,
      rgba(255,228,170,0.040) 37deg, rgba(255,228,170,0.000) 41deg,
      transparent 55deg, rgba(255,240,195,0.000) 60deg,
      rgba(255,240,195,0.035) 63deg, rgba(255,245,205,0.045) 65deg,
      rgba(255,240,195,0.035) 67deg, rgba(255,240,195,0.000) 71deg,
      transparent 360deg
    );
    animation: rayDrift 90s linear infinite;
  }
  @keyframes rayDrift {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .studio-glow {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse 64% 52% at 50% 38%,
      rgba(255,238,218,0.38) 0%, rgba(255,222,200,0.08) 52%, transparent 74%);
    mix-blend-mode: screen;
    animation: breathe 18s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity:.52; transform:scale(1);    }
    50%     { opacity:.92; transform:scale(1.07); }
  }

  .vignette {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9;
    background: radial-gradient(ellipse 90% 80% at 50% 48%,
      transparent 42%, rgba(38,14,6,0.07) 68%, rgba(38,14,6,0.16) 100%);
  }

  #curtainCanvas { position:fixed; inset:0; z-index:1; pointer-events:none; }
  #sparkCanvas   { position:fixed; inset:0; z-index:8; pointer-events:none; }

  .stage {
    position: relative; z-index: 4;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 3.5vh 4vw 3.5vh;
  }

  /* ── CHANGED: title now matches "The Strings Of Love" shimmer style ── */
  .page-title {
    font-family: 'Berkshire Swash', cursive;
    font-weight: 400;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.01em;
    line-height: 1.15;
    text-align: center;
    white-space: nowrap;
    background: linear-gradient(135deg, #5c2e16, #bd6528, var(--pink-neon), #5c2e16);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s linear infinite;
    z-index: 10;
  }
  @keyframes shimmer {
    0%   { background-position: 0%   center; }
    100% { background-position: 200% center; }
  }

  .piano-wrap {
    flex: 1; width: 100%; max-width: 960px;
    display: flex; align-items: center; justify-content: center;
    padding: 0.5vh 0; position: relative;
  }

  #pianoSVG {
    width: 100%; height: 100%; max-height: 72vh;
    display: block;
    filter:
      drop-shadow(0 22px 44px rgba(60,30,20,0.34))
      drop-shadow(0 5px 14px rgba(90,40,20,0.20));
    cursor: pointer;
    touch-action: none;
  }

  .whiteKey {
    fill: url(#whiteKeyGrad);
    stroke: #d8c9ae; stroke-width: 1;
    transition: filter .12s ease;
  }
  .whiteKey.pressed { filter: brightness(.80); }
  .blackKey { fill: url(#blackKeyGrad); pointer-events: none; }
  .keyLabel {
    font-family: 'DM Sans', sans-serif; font-weight: 600;
    font-size: 15px; fill: #8a6a4a;
    pointer-events: none; user-select: none;
  }

  .bottom {
    width: 100%; max-width: 720px;
    display: flex; flex-direction: column;
    align-items: center; gap: 1.2vh;
    margin-bottom: 4vh; /* ── CHANGED: lifts bottom section higher ── */
  }

  /* ── CHANGED: button increased (66→106px) ── */
  .continue-btn {
    margin-left:  auto;
    margin-right: auto;
    display:      flex;
    align-items:  center;
    justify-content: center;
    width:  106px;
    height: 106px;
    border-radius: 50%;
    position: relative;
    background: linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
    box-shadow:
      0 1px 0 rgba(255,255,255,.5) inset,
      0 14px 28px -10px rgba(244,167,185,.7);
    border: none;
    cursor: not-allowed;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.7);
    transition:
      opacity    0.65s cubic-bezier(0.34,1.56,0.64,1),
      transform  0.65s cubic-bezier(0.34,1.56,0.64,1);
  }
  .continue-btn.unlocked {
    opacity: 1;
    transform: scale(1);
    cursor: pointer;
    pointer-events: auto;
    animation: arrowFloat 2.4s ease-in-out infinite;
  }
  .continue-btn::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
    opacity: 0;
    filter: blur(14px);
    z-index: -1;
    transition: opacity 0.65s ease;
  }
  .continue-btn.unlocked::before {
    animation: arrowGlowPulse 2.4s ease-in-out infinite;
  }
  /* ── CHANGED: icon increased (26→42px) ── */
  .continue-btn svg {
    width: 42px; height: 42px;
    color: var(--cream-base);
    transition: transform .25s ease;
  }
  .continue-btn.unlocked:hover {
    animation: none;
    transform: translateY(-5px) scale(1.08) rotate(-4deg);
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 20px 40px -10px rgba(255,143,176,.85);
    filter: brightness(1.05);
  }
  .continue-btn.unlocked:hover svg { transform: translateX(4px) rotate(8deg); }
  .continue-btn.unlocked:active    { transform: translateY(-2px) scale(.95); }

  @keyframes arrowFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-7px); }
  }
  @keyframes arrowGlowPulse {
    0%,100% { opacity: .3; transform: scale(1); }
    50%     { opacity: .6; transform: scale(1.18); }
  }

  @media (prefers-reduced-motion: reduce) {
    .light-rays, .studio-glow, .page-title,
    .continue-btn, .continue-btn::before { animation: none !important; }
    .page-title { opacity: 1; transform: none; }
  }
</style>
</head>

<script>
(() => {
  'use strict';

  const NOTE_FILES  = [
    'note1.ogg','note2.ogg','note3.ogg','note4.ogg','note5.ogg',
    'note6.ogg','note7.mp3','note8.mp3','note9.mp3','note10.mp3'
  ];
  const KEY_LETTERS = ['Q','W','E','R','T','Y','U','I','O','P'];

  const sounds = NOTE_FILES.map(f => {
    const a = new Audio(f);
    a.preload = 'auto'; a.volume = 0.9; return a;
  });

  function playNote(idx) {
    const base = sounds[idx];
    if (!base) return;
    try {
      const clone = base.cloneNode(true);
      clone.volume = base.volume;
      clone.play().catch(() => {});
    } catch(e) {}
  }

  const keyAnims = Array.from({ length: 10 }, () => ({ animId: null }));

  function pressKeyVisual(idx) {
    const s  = keyAnims[idx];
    const el = document.getElementById(`wkey${idx}`);
    if (!el) return;
    if (s.animId) cancelAnimationFrame(s.animId);
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 130);
    const t0 = performance.now(), dur = 580;
    function frame(now) {
      const t = now - t0;
      if (t >= dur) { el.removeAttribute('transform'); s.animId = null; return; }
      const y = 7 * Math.exp(-t / 120) * Math.cos((2 * Math.PI * t) / 260);
      el.setAttribute('transform', `translate(0,${y.toFixed(2)})`);
      s.animId = requestAnimationFrame(frame);
    }
    s.animId = requestAnimationFrame(frame);
  }

  const sparkCanvas = document.getElementById('sparkCanvas');
  const sctx = sparkCanvas.getContext('2d');
  let sparks = [];

  function resizeSpark() {
    sparkCanvas.width  = window.innerWidth;
    sparkCanvas.height = window.innerHeight;
  }
  resizeSpark();

  const sparkPalette = [
    '#f0c060','#ffe9b3','#FF8FB0','#FFD1DC','#FDFBF7',
    '#f8c8d4','#ffd098','rgba(255,200,210,0.9)'
  ];

  function emitSparks(ox, oy) {
    const n = 12 + Math.floor(Math.random() * 6);
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = 0.8 + Math.random() * 2.8;
      sparks.push({
        x: ox, y: oy,
        vx: Math.cos(angle) * spd * 0.6,
        vy: Math.sin(angle) * spd - 1.8,
        life: 1,
        decay: 0.010 + Math.random() * 0.022,
        size:  1.2 + Math.random() * 2.8,
        color: sparkPalette[Math.floor(Math.random() * sparkPalette.length)],
        ring: false
      });
    }
    for (let i = 0; i < 3; i++) {
      sparks.push({
        x: ox, y: oy,
        vx: (Math.random() - 0.5) * 0.6,
        vy: -(0.5 + Math.random() * 1.2),
        life: 1,
        decay: 0.007 + Math.random() * 0.009,
        size:  4 + Math.random() * 6,
        color: `rgba(255,${160 + Math.floor(Math.random()*60)},${185 + Math.floor(Math.random()*50)},0.55)`,
        ring: true
      });
    }
  }

  function renderSparks() {
    sctx.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);
    sctx.globalCompositeOperation = 'lighter';
    sparks = sparks.filter(p => p.life > 0);
    for (const p of sparks) {
      p.x  += p.vx; p.y += p.vy; p.vy -= 0.016; p.life -= p.decay;
      const a = Math.max(p.life, 0);
      sctx.globalAlpha = a;
      if (p.ring) {
        const r = p.size * (1 + (1 - p.life) * 4);
        sctx.strokeStyle = p.color; sctx.lineWidth = 1.2;
        sctx.beginPath(); sctx.arc(p.x, p.y, r, 0, Math.PI * 2); sctx.stroke();
      } else {
        sctx.fillStyle = p.color;
        sctx.beginPath(); sctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2); sctx.fill();
      }
    }
    sctx.globalAlpha = 1;
    sctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(renderSparks);
  }
  renderSparks();

  const curtain = document.getElementById('curtainCanvas');
  const cctx    = curtain.getContext('2d');
  let cTime = 0;

  function resizeCurtain() {
    curtain.width  = window.innerWidth;
    curtain.height = window.innerHeight;
  }
  resizeCurtain();

  function drawCurtain() {
    cTime += 0.009;
    const w = curtain.width, h = curtain.height;
    cctx.clearRect(0, 0, w, h);
    const folds = 16, fw = w / folds;
    for (let i = 0; i <= folds; i++) {
      const bx = i * fw;
      cctx.beginPath(); cctx.moveTo(bx, 0);
      const seg = 28;
      for (let s = 0; s <= seg; s++) {
        const y    = (s / seg) * h;
        const sway =
          Math.sin(cTime + i * 0.46 + y * 0.0040) * 22 +
          Math.cos(cTime * 0.58 + y * 0.0055 + i * 0.28) * 12 +
          Math.sin(cTime * 1.3  + i * 0.9  + y * 0.002) * 4;
        cctx.lineTo(bx + sway, y);
      }
      const g = cctx.createLinearGradient(bx - fw * 0.55, 0, bx + fw * 0.55, 0);
      g.addColorStop(0,    'rgba(252,240,236,0.000)');
      g.addColorStop(0.35, 'rgba(254,248,245,0.065)');
      g.addColorStop(0.50, 'rgba(255,252,250,0.115)');
      g.addColorStop(0.65, 'rgba(254,248,245,0.065)');
      g.addColorStop(1,    'rgba(252,240,236,0.000)');
      cctx.strokeStyle = g;
      cctx.lineWidth   = fw * 0.90;
      cctx.lineCap     = 'round';
      cctx.stroke();
    }
    const sx = w * 0.50 + Math.sin(cTime * 0.32) * w * 0.30;
    const sy = h * 0.44 + Math.cos(cTime * 0.25) * h * 0.09;
    const sg = cctx.createRadialGradient(sx, sy, 0, sx, sy, w * 0.44);
    sg.addColorStop(0, 'rgba(255,250,242,0.080)');
    sg.addColorStop(0.4, 'rgba(255,244,236,0.040)');
    sg.addColorStop(1, 'rgba(255,244,236,0.000)');
    cctx.fillStyle = sg; cctx.fillRect(0, 0, w, h);
    requestAnimationFrame(drawCurtain);
  }
  drawCurtain();

  const continueBtn = document.getElementById('continueBtn');
  continueBtn.classList.add('unlocked');

  const lastHit = {};

  function triggerKey(idx, cx, cy) {
    if (idx < 0 || idx > 9) return;
    const now = performance.now();
    if (now - (lastHit[idx] || 0) < 110) return;
    lastHit[idx] = now;

    playNote(idx);
    pressKeyVisual(idx);

    if (cx == null || cy == null) {
      const r = document.getElementById(`wkey${idx}`).getBoundingClientRect();
      cx = r.left + r.width  * 0.5;
      cy = r.top  + r.height * 0.65;
    }
    emitSparks(cx, cy);
  }

  const pianoSVG = document.getElementById('pianoSVG');

  function svgPoint(cx, cy) {
    const r = pianoSVG.getBoundingClientRect();
    return {
      x: ((cx - r.left) / r.width)  * 900,
      y: ((cy - r.top)  / r.height) * 420
    };
  }

  const KEY_BOUNDS = [
    { x0:155, x1:214, i:0 }, { x0:214, x1:273, i:1 },
    { x0:273, x1:332, i:2 }, { x0:332, x1:391, i:3 },
    { x0:391, x1:450, i:4 }, { x0:450, x1:509, i:5 },
    { x0:509, x1:568, i:6 }, { x0:568, x1:627, i:7 },
    { x0:627, x1:686, i:8 }, { x0:686, x1:745, i:9 }
  ];

  function getKeyAt(sx, sy) {
    if (sy < 212 || sy > 380) return -1;
    for (const k of KEY_BOUNDS) {
      if (sx >= k.x0 && sx < k.x1) return k.i;
    }
    return -1;
  }

  let pointerDown = false, lastSwept = -1;

  function handlePointer(cx, cy, isMove) {
    const { x, y } = svgPoint(cx, cy);
    const idx = getKeyAt(x, y);
    if (idx === -1) return;
    if (isMove && idx === lastSwept) return;
    lastSwept = idx;
    triggerKey(idx, cx, cy);
  }

  pianoSVG.addEventListener('mousedown', e => {
    pointerDown = true; lastSwept = -1;
    handlePointer(e.clientX, e.clientY, false);
  });
  window.addEventListener('mouseup', () => { pointerDown = false; lastSwept = -1; });
  pianoSVG.addEventListener('mousemove', e => {
    if (pointerDown) handlePointer(e.clientX, e.clientY, true);
  });
  pianoSVG.addEventListener('touchstart', e => {
    e.preventDefault(); lastSwept = -1;
    for (const t of e.changedTouches) handlePointer(t.clientX, t.clientY, false);
  }, { passive: false });
  pianoSVG.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) handlePointer(t.clientX, t.clientY, true);
  }, { passive: false });

  const held = new Set();
  window.addEventListener('keydown', e => {
    const k   = e.key.toUpperCase();
    const idx = KEY_LETTERS.indexOf(k);
    if (idx === -1 || held.has(k)) return;
    held.add(k); triggerKey(idx);
  });
  window.addEventListener('keyup', e => held.delete(e.key.toUpperCase()));

  continueBtn.addEventListener('click', () => {
    window.location.href = 'basket.html';
  });

  window.addEventListener('resize', () => {
    resizeSpark();
    resizeCurtain();
  });

})();
</script>
</body>
</html>
